  <!-- ✅ IMPORTANT: ORDER IS CRUCIAL -->
  <script src="data/countries.js"></script>
  <script src="data/header.js"></script>

  <script>
        /* i18n moved above header.js */

    function norm(s){
      return (s || "")
        .toString()
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[-_]/g, " ")
        .replace(/\s+/g, " ");
    }

    function escapeHtml(s){
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    const UI = {
      input: document.getElementById("homeQuery"),
      form: document.getElementById("homeSearchForm"),
      btnRandom: document.getElementById("homeRandomBtn"),
      suggest: document.getElementById("homeSuggest")
    };

    let COUNTRY_DATA = null;
    let COUNTRY_LIST = [];
      window.__resetHomeCountries = function(){
  COUNTRY_DATA = null;
  COUNTRY_LIST = [];
  hideSuggest();
};
    async function loadCountriesOnce(){
      if(COUNTRY_DATA) return COUNTRY_DATA;

      const _lang = localStorage.getItem("wigg_lang") || "en";
      const _cf = _lang === "fr" ? "/data/countries.fr.json" : _lang === "es" ? "/data/countries.es.json" : "/data/countries.json";
      const res = await fetch(_cf + "?nocache=" + Date.now(), { cache: "no-store" });
      if(!res.ok) throw new Error("countries.json HTTP " + res.status);

      COUNTRY_DATA = await res.json();

      COUNTRY_LIST = Object.keys(COUNTRY_DATA).map(slug => {
        const c = COUNTRY_DATA[slug] || {};
        const aliases = Array.isArray(c.aliases) ? c.aliases : [];
        return {
          slug,
          name: c.name || slug,
          nameNorm: norm(c.name || slug),
          aliasesNorm: aliases.map(norm)
        };
      }).sort((a,b) => a.name.localeCompare(b.name));

      return COUNTRY_DATA;
    }

    function buildUrl(slug){
      return "/countries/country.html?country=" + encodeURIComponent(slug);
    }

    function findBestMatch(queryNorm){
      if(!queryNorm) return null;

      let hit = COUNTRY_LIST.find(x => x.nameNorm === queryNorm || x.aliasesNorm.includes(queryNorm));
      if(hit) return hit;

      hit = COUNTRY_LIST.find(x => x.nameNorm.startsWith(queryNorm) || x.aliasesNorm.some(a => a.startsWith(queryNorm)));
      if(hit) return hit;

      hit = COUNTRY_LIST.find(x => x.nameNorm.includes(queryNorm) || x.aliasesNorm.some(a => a.includes(queryNorm)));
      return hit || null;
    }

    function getSuggestions(queryNorm, limit=10){
      if(!queryNorm) return [];

      const starts = [];
      const contains = [];

      for(const x of COUNTRY_LIST){
        if(x.nameNorm.startsWith(queryNorm) || x.aliasesNorm.some(a => a.startsWith(queryNorm))){
          starts.push(x);
        } else if (x.nameNorm.includes(queryNorm) || x.aliasesNorm.some(a => a.includes(queryNorm))){
          contains.push(x);
        }
      }
      return starts.concat(contains).slice(0, limit);
    }

    let activeIndex = -1;
    let currentSugs = [];
    let tDebounce = null;

    function hideSuggest(){
      UI.suggest.style.display = "none";
      UI.suggest.innerHTML = "";
      activeIndex = -1;
      currentSugs = [];
    }

    function showSuggest(items){
      currentSugs = items;
      activeIndex = -1;

      if(!items.length){
        hideSuggest();
        return;
      }

      UI.suggest.innerHTML = items.map((x, i) => {
        return `
          <div class="home-suggest-item" data-i="${i}" role="option" aria-selected="false">
            <span>${escapeHtml(x.name)}</span>
            <span class="home-suggest-sub">${escapeHtml(x.slug)}</span>
          </div>
        `;
      }).join("");

      UI.suggest.style.display = "block";
    }

    function setActive(idx){
      const children = Array.from(UI.suggest.querySelectorAll(".home-suggest-item"));
      children.forEach((el) => el.setAttribute("aria-selected","false"));
      if(idx >= 0 && idx < children.length){
        children[idx].setAttribute("aria-selected","true");
        activeIndex = idx;
      } else {
        activeIndex = -1;
      }
    }

    function goToSlug(slug, openNewTab=false){
      const url = buildUrl(slug);
      if(openNewTab) window.open(url, "_blank", "noopener,noreferrer");
      else window.location.href = url;
    }

    UI.suggest.addEventListener("click", (e) => {
      const item = e.target.closest(".home-suggest-item");
      if(!item) return;
      const i = Number(item.getAttribute("data-i"));
      if(Number.isFinite(i) && currentSugs[i]){
        goToSlug(currentSugs[i].slug, false);
      }
    });

    UI.input.addEventListener("input", async () => {
      clearTimeout(tDebounce);
      tDebounce = setTimeout(async () => {
        await loadCountriesOnce();
        const q = norm(UI.input.value);
        const sugs = getSuggestions(q, 10);
        showSuggest(sugs);
      }, 80);
    });

    UI.input.addEventListener("keydown", (e) => {
      if(UI.suggest.style.display !== "block") return;

      const max = currentSugs.length - 1;

      if(e.key === "ArrowDown"){
        e.preventDefault();
        const next = activeIndex < max ? activeIndex + 1 : 0;
        setActive(next);
      }

      if(e.key === "ArrowUp"){
        e.preventDefault();
        const prev = activeIndex > 0 ? activeIndex - 1 : max;
        setActive(prev);
      }

      if(e.key === "Enter"){
        if(activeIndex >= 0 && currentSugs[activeIndex]){
          e.preventDefault();
          goToSlug(currentSugs[activeIndex].slug, false);
        }
      }

      if(e.key === "Escape"){
        hideSuggest();
      }
    });

    document.addEventListener("click", (e) => {
      if(e.target.closest("#homeSearchForm") || e.target.closest("#homeSuggest")) return;
      hideSuggest();
    });

    UI.form.addEventListener("submit", async (e) => {
      e.preventDefault();
      await loadCountriesOnce();

      const q = norm(UI.input.value);

      if(!q){
        return goRandom(false);
      }

      if(activeIndex >= 0 && currentSugs[activeIndex]){
        return goToSlug(currentSugs[activeIndex].slug, false);
      }

      const match = findBestMatch(q);
      if(match){
        goToSlug(match.slug, false);
      }else{
        alert(window.__HOME_NO_MATCH || "No match found. Try another spelling (or pick from suggestions).");
        hideSuggest();
        UI.input.focus();
      }
    });

    async function goRandom(openNewTab=false){
      await loadCountriesOnce();
      const keys = Object.keys(COUNTRY_DATA || {});
      if(!keys.length){
        alert("No countries in countries.json");
        return;
      }
      const slug = keys[Math.floor(Math.random() * keys.length)];
      goToSlug(slug, openNewTab);
    }

    UI.btnRandom.addEventListener("click", (e) => {
      e.preventDefault();
      goRandom(true);
    });

    loadCountriesOnce().catch(console.error);

    (function(){
      const btnHeader = document.getElementById("btnRandom");
      if(btnHeader){
        btnHeader.addEventListener("click", (e) => {
          e.preventDefault();
          goRandom(false);
        });
      }
    })();
  </script>
