<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />

  <title>WiggMap Globe</title>

  <script src="https://unpkg.com/globe.gl"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{
      height:100%;overflow:hidden;
      background: radial-gradient(ellipse at 50% 40%, #0e1a2e 0%, #060c18 55%, #030710 100%);
    }
    #globe{width:100vw;height:100vh}

    .hud{
      position:fixed;top:14px;left:14px;z-index:10;
      background:rgba(8,14,28,.70);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,.10);
      border-radius:16px;padding:10px 14px;color:#e8f0ff;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;font-size:13px;
      display:flex;align-items:center;gap:12px;
      max-width: calc(100vw - 28px);
      flex-wrap: wrap;
    }
    .hud-logo{
      font-weight:900;font-size:14px;letter-spacing:-.3px;color:#fff;
      white-space:nowrap;flex-shrink:0;
    }
    .hud-logo span{color:rgba(46,204,113,.9);}
    .hud .status{
      font-weight:700;font-size:12px;color:rgba(200,215,255,.65);
      white-space:nowrap;flex:0 0 auto;
    }

    /* Search bar */
    .searchWrap{
      position:relative;margin-left:auto;
      flex: 1 1 240px;min-width:180px;max-width:320px;
    }
    .searchWrap input{
      width:100%;padding:9px 14px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.13);
      background:rgba(255,255,255,.07);
      color:#e8f0ff;outline:none;
      font-weight:700;font-size:13px;
    }
    .searchWrap input::placeholder{color:rgba(220,235,255,.45);}
    .searchWrap input:focus{
      border-color:rgba(46,204,113,.6);
      box-shadow:0 0 0 3px rgba(46,204,113,.15);
      background:rgba(255,255,255,.09);
    }
    @media(max-width:520px){
      .searchWrap{margin-left:0;width:100%;max-width:100%;flex:1 1 100%;}
    }

    .acList{
      position:absolute;top:calc(100% + 6px);left:0;right:0;
      background:rgba(8,14,28,.97);
      border:1px solid rgba(255,255,255,.10);
      border-radius:12px;overflow:hidden;
      box-shadow:0 16px 48px rgba(0,0,0,.65);
      max-height:300px;overflow-y:auto;display:none;z-index:999;
    }
    .acItem{
      display:flex;align-items:center;gap:10px;
      padding:9px 12px;cursor:pointer;
      border-bottom:1px solid rgba(255,255,255,.06);
      font-weight:800;color:#e8f0ff;font-size:13px;
    }
    .acItem img{width:36px;height:24px;object-fit:cover;border-radius:4px;flex-shrink:0;opacity:.85;}
    .acItem:hover{background:rgba(46,204,113,.12);}
    .acItem small{display:block;margin-top:2px;font-weight:700;font-size:11px;color:rgba(200,215,255,.55);}
    .acItem:last-child{border-bottom:none;}

    /* ── Tooltip ─────────────────────────────────────────────── */
    #tooltip{
      position:fixed;
      background:rgba(8,14,28,.97);
      backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,.11);
      border-radius:14px;
      color:#fff;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      opacity:0;
      transition:opacity 0.18s ease, transform 0.18s ease;
      z-index:1000;
      box-shadow:0 12px 40px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.04) inset;
      letter-spacing:0.15px;
      transform:translateY(6px);
      max-width:min(300px, calc(100vw - 24px));
      pointer-events:none;
      overflow:hidden;
    }
    #tooltip.visible{opacity:1;transform:translateY(0);}

    /* Hero image */
    .tt-img-wrap{
      position:relative;height:120px;overflow:hidden;
      background:rgba(255,255,255,.05);
    }
    .tt-img-wrap img{
      width:100%;height:100%;object-fit:cover;display:block;
      transition:transform .3s ease;
    }
    .tt-img-wrap::after{
      content:"";position:absolute;inset:0;
      background:linear-gradient(to bottom, rgba(8,14,28,0) 40%, rgba(8,14,28,.85) 100%);
    }
    .tt-img-name{
      position:absolute;bottom:8px;left:10px;right:10px;
      font-size:16px;font-weight:900;color:#fff;
      text-shadow:0 1px 6px rgba(0,0,0,.7);
      z-index:1;letter-spacing:-.2px;
    }
    .tt-no-img{ display:none; }

    /* Body */
    .tt-body{padding:10px 12px 10px;}
    .tt-grid{display:grid;grid-template-columns:1fr;gap:5px;font-size:12px;font-weight:800;color:rgba(220,235,255,.9);}
    .tt-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
    .tt-row span{color:rgba(200,215,255,.55);font-weight:700;font-size:11px;}
    .tt-row b{font-weight:900;color:#fff;text-align:right;}
    .tt-wigg{
      display:inline-flex;align-items:center;gap:5px;
      padding:2px 8px;border-radius:999px;font-size:11px;font-weight:800;
      border:1px solid rgba(255,255,255,.12);

    .tt-wigg.green{background:rgba(34,197,94,.18);color:#4ade80;border-color:rgba(34,197,94,.25);}

    .tt-wigg.red{background:rgba(239,68,68,.15);color:#f87171;border-color:rgba(239,68,68,.25);}
    .tt-foot{
      padding:8px 12px 10px;
      font-size:11px;color:rgba(200,215,255,.5);font-weight:800;
      display:flex;gap:7px;flex-wrap:wrap;
      border-top:1px solid rgba(255,255,255,.07);
    }
    .pill{
      display:inline-flex;align-items:center;gap:5px;
      padding:4px 10px;border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.05);

      cursor:pointer;pointer-events:auto;user-select:none;
    }
    .pill.btn:hover{background:rgba(255,255,255,.10);}
  </style>

function normName(s){
  return String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
}
function esc(s){
  return String(s ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

// Mouse tracking for tooltip on desktop
let mouseX = 20, mouseY = 20;

function placeTooltipNearCursor() {
  const pad = 12;
  const w = tooltip.offsetWidth || 260;
  const h = tooltip.offsetHeight || 140;

  let x = mouseX + 18;
  let y = mouseY + 18;

  if (x + w + pad > window.innerWidth) x = window.innerWidth - w - pad;
  if (y + h + pad > window.innerHeight) y = window.innerHeight - h - pad;
  if (x < pad) x = pad;
  if (y < pad) y = pad;

  tooltip.style.left = x + "px";
  tooltip.style.top  = y + "px";
}

// ==== Tooltip data ====
let COUNTRIES_DB = null;
let ALL = [];
const detailsCache = {};

async function loadCountriesDB(){
  if(COUNTRIES_DB) return COUNTRIES_DB;
  const _lang = localStorage.getItem("wigg_lang") || "en";
  const _cf = _lang === "fr" ? "data/countries.fr.json" : _lang === "es" ? "data/countries.es.json" : "data/countries.json";
  const r = await fetch(_cf, { cache: "no-store" });
  if(!r.ok) throw new Error("countries.json not found");
  COUNTRIES_DB = await r.json();
  ALL = Object.keys(COUNTRIES_DB).map(code => ({
    code,
    name: COUNTRIES_DB[code]?.name || code,
    aliases: COUNTRIES_DB[code]?.aliases || []
  }));
  return COUNTRIES_DB;
}

async function loadDetails(slug){
  if(slug in detailsCache) return detailsCache[slug];
  try{
    const _dlang = localStorage.getItem("wigg_lang") || "en";
    const _df = _dlang === "fr" ? "details-fr" : _dlang === "es" ? "details-es" : "details";
    const r = await fetch(`data/${_df}/${slug}.json`, { cache: "no-store" });
    if(!r.ok){ detailsCache[slug] = null; return null; }
    const j = await r.json();
    detailsCache[slug] = j;
    return j;
  }catch(e){
    detailsCache[slug] = null;
    return null;
  }
}

function getAvgSalary(slug){ return COUNTRIES_DB?.[slug]?.fields?.avg_salary?.value || "—"; }
function getSunnyDays(slug){ return COUNTRIES_DB?.[slug]?.fields?.sun?.value || "—"; }
function getWiggColor(slug){ return COUNTRIES_DB?.[slug]?.wigg?.level || "yellow"; }
function getWiggLabel(slug){ return COUNTRIES_DB?.[slug]?.wigg?.label || "WIGG"; }
function getExpatScoreLabel(details){ return details?.expat_score?.label || details?.name_note || null; }
function getPersonalityName(details){
  return (
    details?.goDeeper?.things_to_know?.personality?.name ||
    details?.things_to_know?.personality?.name ||
    details?.goDeeper?.personality?.name ||
    null
  );
}
function getHeroSrc(slug){
  // countries.json stores paths as "../assets/hero-xxx.jpg" (relative to /countries/)
  // globe.html is at root, so we strip the leading ../
  const raw = COUNTRIES_DB?.[slug]?.hero?.src || "";
  return raw.replace(/^\.\.\//,"");
}

let tooltipPinned = false;
let pinnedSlug = null;
let lastTapAt = 0;

function tooltipHTML(displayName, slug, details, pinned){
  const expat   = getExpatScoreLabel(details);
  const salary  = getAvgSalary(slug);
  const sun     = getSunnyDays(slug);
  const persona = getPersonalityName(details);
  const wiggColor = getWiggColor(slug);
  const wiggLabel = getWiggLabel(slug);
  const heroSrc   = getHeroSrc(slug);

  const imgBlock = heroSrc
    ? `<div class="tt-img-wrap">
         <img src="${esc(heroSrc)}" alt="${esc(displayName)}" onerror="this.parentElement.style.display='none'" />
         <div class="tt-img-name">${esc(displayName)}</div>
       </div>`
    : `<div class="tt-body" style="padding-bottom:4px"><div style="font-size:15px;font-weight:900;margin-bottom:6px">${esc(displayName)}</div></div>`;

  const rows = [];
  rows.push(`<div class="tt-row"><span>Expat score</span><b>${esc(expat || "—")}</b></div>`);
  rows.push(`<div class="tt-row"><span>Avg salary</span><b>${esc(salary)}</b></div>`);
  if(persona) rows.push(`<div class="tt-row"><span>Icon</span><b>${esc(persona)}</b></div>`);
  rows.push(`<div class="tt-row"><span>Sunny days / yr</span><b>${esc(sun)}</b></div>`);
  rows.push(`<div class="tt-row"><span>WIGG level</span><b><span class="tt-wigg ${esc(wiggColor)}">${esc(wiggLabel)}</span></b></div>`);

  const footAction = pinned
    ? `<span class="pill btn green-pill" data-action="open" data-slug="${esc(slug)}">↗ Open page</span><span class="pill btn" data-action="close">✕ Close</span>`
    : `<span class="pill">Click to open</span>`;

  return `${imgBlock}
    <div class="tt-body">
      <div class="tt-grid">${rows.join("")}</div>
    </div>
    <div class="tt-foot">${footAction}</div>`;
}

function showTooltip(html){
  tooltip.innerHTML = html;
  tooltip.classList.add("visible");
  if(!TOUCH_UI && !tooltipPinned) placeTooltipNearCursor();
}
function hideTooltip(){
  tooltip.classList.remove("visible");
  if(!tooltipPinned) tooltip.innerHTML = "";
}
function pinTooltip(html){
  tooltipPinned = true;
  tooltip.innerHTML = html;
  tooltip.classList.add("visible");
  // pin top-left (readable)
  tooltip.style.left = "14px";
  tooltip.style.top  = "68px";
  tooltip.style.pointerEvents = "auto"; // allow Close click
}
function unpinTooltip(){
  tooltipPinned = false;
  pinnedSlug = null;
  tooltip.style.pointerEvents = "none";
}

// Buttons in tooltip (mobile)
tooltip.addEventListener("click", (e) => {
  const btn = e.target && e.target.closest("[data-action]");
  if(!btn) return;
  const action = btn.getAttribute("data-action");
  if(action === "close"){
    unpinTooltip();
    hideTooltip();
  } else if(action === "open"){
    const slug = btn.getAttribute("data-slug");
    if(slug) window.location.href = `/countries/country.html?country=${slug}`;
  }
});

// ==== Search focuses globe (no navigation) ====
let featureBySlug = {};
let hoveredFeature = null;

function centroidOfFeature(feature){
  const geom = feature?.geometry;
  if(!geom) return null;
  const coords = geom.coordinates;
  let points = [];
  function pushRing(ring){
    for(const p of ring){
      if(Array.isArray(p) && p.length >= 2) points.push(p);
    }
  }
  if(geom.type === "Polygon"){
    pushRing(coords[0] || []);
  } else if(geom.type === "MultiPolygon"){
    let best = null;
    for(const poly of coords){
      const ring = poly?.[0] || [];
      if(!best || ring.length > best.length) best = ring;
    }
    if(best) pushRing(best);
  }
  if(points.length === 0) return null;
  let sumLng=0,sumLat=0;
  for(const [lng,lat] of points){ sumLng+=lng; sumLat+=lat; }
  return { lng: sumLng/points.length, lat: sumLat/points.length };
}

async function focusCountryOnGlobe(globe, slug){
  const feature = featureBySlug[slug];
  if(!feature){ setStatus(`Not mapped on globe: ${slug}`); return; }

  hoveredFeature = feature;
  globe.polygonCapColor(globe.polygonCapColor());

  const c = centroidOfFeature(feature);
  if(c){
    globe.pointOfView({ lat: c.lat, lng: c.lng, altitude: 1.65 }, 750);
  }

  const displayName = feature.properties?.name || COUNTRIES_DB?.[slug]?.name || slug;
  const d = await loadDetails(slug);

  if(TOUCH_UI){
    pinnedSlug = slug;
    lastTapAt = Date.now();
    pinTooltip(tooltipHTML(displayName, slug, d, true));
    setStatus(`${displayName} — tap again to open`);
  } else {
    showTooltip(tooltipHTML(displayName, slug, d, false));
    setStatus(`${displayName} — click to open`);
    placeTooltipNearCursor();
  }
}

function setupSearch(globe){
  function renderList(items){
    if(!items.length){ acList.style.display="none"; return; }
    acList.innerHTML = items.map(c => {
      const hero = getHeroSrc(c.code);
      const imgTag = hero ? `<img src="${esc(hero)}" alt="" onerror="this.style.display='none'" />` : "";
      return `<div class="acItem" data-code="${esc(c.code)}">${imgTag}<div>${esc(c.name)}<small>${esc(c.code)}</small></div></div>`;
    }).join("");
    acList.style.display="block";

    acList.querySelectorAll(".acItem").forEach(el => {
      el.addEventListener("click", async () => {
        const code = el.getAttribute("data-code");
        searchInput.value = (COUNTRIES_DB?.[code]?.name) || code;
        acList.style.display="none";
        await focusCountryOnGlobe(globe, code);
      });
    });
  }

  searchInput.addEventListener("input", () => {
    const q = searchInput.value.toLowerCase().trim();
    if(!q){ acList.style.display="none"; return; }

    const res = ALL.filter(c => {
      if(c.name.toLowerCase().includes(q)) return true;
      return (c.aliases||[]).some(a => String(a).toLowerCase().includes(q));
    }).slice(0, 12);

    renderList(res);
  });

  searchInput.addEventListener("blur", () => setTimeout(() => acList.style.display="none", 160));

  searchInput.addEventListener("keydown", async (e) => {
    if(e.key === "Enter"){
      const q = searchInput.value.toLowerCase().trim();
      if(!q) return;
      const hit = ALL.find(c => c.code === q)
        || ALL.find(c => c.name.toLowerCase() === q)
        || ALL.find(c => (c.aliases||[]).some(a => String(a).toLowerCase() === q));
      if(hit){
        acList.style.display="none";
        await focusCountryOnGlobe(globe, hit.code);
      }
    }
    if(e.key === "Escape"){ acList.style.display="none"; searchInput.blur(); }
  });
}

async function init(){
  setStatus("Loading...");

  await loadCountriesDB();

  const world = await fetch("https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson")
    .then(r => r.json());

  // build slug->feature index + match count
  featureBySlug = {};
  let matchCount = 0;
  world.features.forEach(f => {
    const dispName = f.properties?.name || "";
    const key = normName(dispName);
    const data = COUNTRY_MAP[key];
    if(data?.slug){
      matchCount++;
      if(!featureBySlug[data.slug]) featureBySlug[data.slug] = f;
    }
  });

  setStatus(`Ready — ${matchCount} countries clickable`);

  let hoverTimer = null;
  let lastHoverSlug = null;

  const globe = Globe()(document.getElementById("globe"))
    .backgroundColor("rgba(0,0,0,0)")
    .globeImageUrl("./assets/earth-grass.png")
    .bumpImageUrl("https://unpkg.com/three-globe/example/img/earth-topology.png")
    .showAtmosphere(true)
    .atmosphereColor("rgba(60,120,255,0.7)")
    .atmosphereAltitude(0.22)
    .polygonsData(world.features)
    .polygonAltitude(f => f === hoveredFeature ? 0.025 : 0.012)
    .polygonStrokeColor(() => "rgba(255,255,255,0.18)")
    .polygonSideColor(() => "rgba(60,120,255,0.08)")
    .polygonCapColor(f => {
      if (f !== hoveredFeature) return "rgba(0,0,0,0)";
      const name = normName(f.properties?.name || "");
      const data = COUNTRY_MAP[name];
      return data ? HOVER_COLORS[data.color] : "rgba(255,214,0,0.55)";
    })
    .onPolygonHover(f => {
      hoveredFeature = f || null;
      globe.polygonCapColor(globe.polygonCapColor());
      globe.polygonAltitude(globe.polygonAltitude());

      // On mobile pinned mode: ignore hover behavior
      if(TOUCH_UI) return;
      if(tooltipPinned) return;

      if(f){
        const dispName = f.properties?.name || "Unknown";
        const key = normName(dispName);
        const data = COUNTRY_MAP[key];

        if(!data){
          setStatus(dispName);
          showTooltip(`<div class="tt-body"><div style="font-size:15px;font-weight:900;margin-bottom:4px">${esc(dispName)}</div></div><div class="tt-foot"><span class="pill">No data yet</span></div>`);
          return;
        }

        const slug = data.slug;
        setStatus(`${dispName} — click to open`);

        showTooltip(tooltipHTML(dispName, slug, detailsCache[slug] || null, false));

        clearTimeout(hoverTimer);
        lastHoverSlug = slug;
        hoverTimer = setTimeout(async () => {
          const d = await loadDetails(slug);
          if(lastHoverSlug === slug && !tooltipPinned){
            showTooltip(tooltipHTML(dispName, slug, d, false));
          }
        }, 160);

      } else {
        hideTooltip();
      }
    })
    .onPolygonClick(async f => {
      if(!f) return;

      const dispName = f.properties?.name || "Unknown";
      const key = normName(dispName);
      const data = COUNTRY_MAP[key];
      if(!data) return;

      const slug = data.slug;

      // MOBILE: 1st tap pin, 2nd tap open
      if(TOUCH_UI){
        const now = Date.now();
        const same = (pinnedSlug === slug) && (now - lastTapAt < 1500);

        if(!tooltipPinned || !same){
          pinnedSlug = slug;
          lastTapAt = now;
          const d = await loadDetails(slug);
          pinTooltip(tooltipHTML(dispName, slug, d, true));
          setStatus(`${dispName} — tap again to open`);
          return;
        }

        window.location.href = `/countries/country.html?country=${slug}`;
        return;
      }

      // DESKTOP: single click opens
      window.location.href = `/countries/country.html?country=${slug}`;
    });

  // Search focuses globe (no navigation)
  setupSearch(globe);

  // Slower rotation
  globe.controls().autoRotate = true;
  globe.controls().autoRotateSpeed = 0.25;

  // Bump animation (unchanged)
  const scene = globe.scene();
  const g = scene.children.find(o => o.type === 'Mesh' && o.geometry?.type === 'SphereGeometry');
  if (g?.material) {
    g.material.bumpScale = 0.18;
    let t = 0;
    function animate(){
      t += 0.015;
      if (g?.material) g.material.bumpScale = 0.16 + Math.sin(t) * 0.03;
      requestAnimationFrame(animate);
    }
    animate();
  }
}

init().catch(err => {
  console.error(err);
  setStatus("Error: " + err.message);
});
</script>
