  <style>
    html,body{margin:0;height:100%;background:#06090f;overflow:hidden}
    #globe{width:100vw;height:100vh}

    .hud{
      position:fixed;top:14px;left:14px;z-index:10;
      background:rgba(15,18,28,.62);backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.10);
      border-radius:14px;padding:10px 12px;color:#eaf0ff;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;font-size:13px;
      display:flex;align-items:center;gap:10px;
      max-width: calc(100vw - 28px);
      flex-wrap: wrap;               /* ✅ prevent overflow */
    }
    .hud .status{
      font-weight:800;
      white-space:nowrap;
      flex: 0 0 auto;
    }

    /* Search bar */
    .searchWrap{
      position:relative;
      margin-left:auto;
      flex: 1 1 260px;               /* ✅ can shrink */
      min-width: 180px;              /* ✅ smaller */
      max-width: 360px;
    }
    .searchWrap input{
      width:100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color: #eaf0ff;
      outline: none;
      font-weight: 800;
      font-size: 13px;
      box-sizing: border-box;
    }
    .searchWrap input::placeholder{color: rgba(234,240,255,.55); font-weight: 800;}
    .searchWrap input:focus{
      border-color: rgba(46,204,113,.65);
      box-shadow: 0 0 0 4px rgba(46,204,113,.18);
      background: rgba(255,255,255,.08);
    }
    @media (max-width: 520px){
      .searchWrap{
        margin-left: 0;
        width: 100%;
        max-width: 100%;
        flex: 1 1 100%;
      }
    }

    .acList{
      position:absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      background: rgba(10,15,25,.96);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 14px 42px rgba(0,0,0,.55);
      max-height: 320px;
      overflow-y: auto;
      display:none;
      z-index: 999;
    }
    .acItem{
      padding: 10px 12px;
      cursor:pointer;
      border-bottom: 1px solid rgba(255,255,255,.07);
      font-weight: 900;
      color:#eaf0ff;
    }
    .acItem:hover{ background: rgba(46,204,113,.14); }
    .acItem small{display:block;margin-top:4px;font-weight:800;color: rgba(234,240,255,.60);}
    .acItem:last-child{ border-bottom:none; }

    /* Tooltip */
    #tooltip{
      position:fixed;
      background:rgba(10,15,25,.95);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,.12);
      border-radius:12px;
      padding:10px 12px;
      color:#ffffff;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      opacity:0;
      transition:opacity 0.15s ease, transform 0.15s ease;
      z-index:1000;
      box-shadow:0 8px 24px rgba(0,0,0,0.5);
      letter-spacing:0.2px;
      transform: translateY(4px);
      max-width: min(340px, calc(100vw - 24px));
      pointer-events:none; /* desktop follow cursor */
    }
    #tooltip.visible{ opacity:1; transform: translateY(0); }

    .tt-title{ font-size: 15px; font-weight: 950; margin:0 0 6px; }
    .tt-grid{ display:grid; grid-template-columns: 1fr; gap: 6px; font-size: 12px; font-weight: 800; color: rgba(234,240,255,.92); }
    .tt-row{ display:flex; align-items:baseline; justify-content:space-between; gap: 10px; }
    .tt-row span{ color: rgba(234,240,255,.62); font-weight: 900; }
    .tt-row b{ font-weight: 950; color:#fff; text-align:right; }
    .tt-foot{ margin-top: 8px; font-size: 11px; color: rgba(234,240,255,.55); font-weight: 900; display:flex; gap:8px; flex-wrap:wrap; }
    .pill{
      display:inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.06);
    }
    .pill.btn{
      cursor:pointer;
      pointer-events:auto; /* allow click on mobile pinned */
      user-select:none;
    }
  </style>
</head>

function normName(s){
  return String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
}
function esc(s){
  return String(s ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

// Mouse tracking for tooltip on desktop
let mouseX = 20, mouseY = 20;

function placeTooltipNearCursor() {
  const pad = 12;
  const w = tooltip.offsetWidth || 260;
  const h = tooltip.offsetHeight || 140;

  let x = mouseX + 18;
  let y = mouseY + 18;

  if (x + w + pad > window.innerWidth) x = window.innerWidth - w - pad;
  if (y + h + pad > window.innerHeight) y = window.innerHeight - h - pad;
  if (x < pad) x = pad;
  if (y < pad) y = pad;

  tooltip.style.left = x + "px";
  tooltip.style.top  = y + "px";
}

document.addEventListener("mousemove", (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  if(!TOUCH_UI && !tooltipPinned && tooltip.classList.contains("visible")){

});

// ==== Tooltip data ====
let COUNTRIES_DB = null;
let ALL = [];
const detailsCache = {};

async function loadCountriesDB(){
  if(COUNTRIES_DB) return COUNTRIES_DB;
  const _lang = localStorage.getItem("wigg_lang") || "en";
  const _cf = _lang === "fr" ? "data/countries.fr.json" : _lang === "es" ? "data/countries.es.json" : "data/countries.json";
  const r = await fetch(_cf, { cache: "no-store" });
  if(!r.ok) throw new Error("countries.json not found");
  COUNTRIES_DB = await r.json();
  ALL = Object.keys(COUNTRIES_DB).map(code => ({
    code,
    name: COUNTRIES_DB[code]?.name || code,
    aliases: COUNTRIES_DB[code]?.aliases || []
  }));
  return COUNTRIES_DB;
}

async function loadDetails(slug){
  if(slug in detailsCache) return detailsCache[slug];
  try{
    const _dlang = localStorage.getItem("wigg_lang") || "en";
    const _df = _dlang === "fr" ? "details-fr" : _dlang === "es" ? "details-es" : "details";
    const r = await fetch(`data/${_df}/${slug}.json`, { cache: "no-store" });
    if(!r.ok){ detailsCache[slug] = null; return null; }
    const j = await r.json();
    detailsCache[slug] = j;
    return j;
  }catch(e){
    detailsCache[slug] = null;
    return null;
  }
}

function getAvgSalary(slug){ return COUNTRIES_DB?.[slug]?.fields?.avg_salary?.value || "—"; }
function getSunnyDays(slug){ return COUNTRIES_DB?.[slug]?.fields?.sun?.value || "—"; }
function getExpatScoreLabel(details){ return details?.expat_score?.label || details?.name_note || "—"; }
function getPersonalityName(details){
  return (
    details?.goDeeper?.things_to_know?.personality?.name ||
    details?.things_to_know?.personality?.name ||
    details?.goDeeper?.personality?.name ||
    "—"
  );
}

let tooltipPinned = false;
let pinnedSlug = null;
let lastTapAt = 0;

function tooltipHTML(displayName, slug, details, pinned){
  const expat = getExpatScoreLabel(details);
  const salary = getAvgSalary(slug);
  const sun = getSunnyDays(slug);
  const persona = getPersonalityName(details);

  if(pinned){
    return `
      <div class="tt-title">${esc(displayName)}</div>
      <div class="tt-grid">
        <div class="tt-row"><span>Expat score</span><b>${esc(expat)}</b></div>
        <div class="tt-row"><span>Avg salary</span><b>${esc(salary)}</b></div>
        <div class="tt-row"><span>Personality</span><b>${esc(persona)}</b></div>
        <div class="tt-row"><span>Sunny days</span><b>${esc(sun)}</b></div>
      </div>
      <div class="tt-foot">
        <span class="pill">Tap again to open</span>
        <span class="pill btn" data-action="close">Close</span>
      </div>
    `;
  }

  return `
    <div class="tt-title">${esc(displayName)}</div>
    <div class="tt-grid">
      <div class="tt-row"><span>Expat score</span><b>${esc(expat)}</b></div>
      <div class="tt-row"><span>Avg salary</span><b>${esc(salary)}</b></div>
      <div class="tt-row"><span>Personality</span><b>${esc(persona)}</b></div>
      <div class="tt-row"><span>Sunny days</span><b>${esc(sun)}</b></div>
    </div>
    <div class="tt-foot"><span class="pill">Click to open</span></div>
  `;
}

function showTooltip(html){
  tooltip.innerHTML = html;
  tooltip.classList.add("visible");
  if(!TOUCH_UI && !tooltipPinned) placeTooltipNearCursor();
}
function hideTooltip(){
  tooltip.classList.remove("visible");
  if(!tooltipPinned) tooltip.innerHTML = "";
}
function pinTooltip(html){
  tooltipPinned = true;
  tooltip.innerHTML = html;
  tooltip.classList.add("visible");
  // pin top-left (readable)
  tooltip.style.left = "14px";
  tooltip.style.top  = "68px";
  tooltip.style.pointerEvents = "auto"; // allow Close click
}
function unpinTooltip(){
  tooltipPinned = false;
  pinnedSlug = null;
  tooltip.style.pointerEvents = "none";
}

// Close button in tooltip (mobile)
tooltip.addEventListener("click", (e) => {
  const btn = e.target && e.target.closest("[data-action='close']");
  if(btn){
    unpinTooltip();
    hideTooltip();
  }
});

let hoveredFeature = null;

function centroidOfFeature(feature){
  const geom = feature?.geometry;
  if(!geom) return null;
  const coords = geom.coordinates;
  let points = [];
  function pushRing(ring){
    for(const p of ring){
      if(Array.isArray(p) && p.length >= 2) points.push(p);
    }
  }
  if(geom.type === "Polygon"){
    pushRing(coords[0] || []);
  } else if(geom.type === "MultiPolygon"){
    let best = null;
    for(const poly of coords){
      const ring = poly?.[0] || [];
      if(!best || ring.length > best.length) best = ring;
    }
    if(best) pushRing(best);
  }
  if(points.length === 0) return null;
  let sumLng=0,sumLat=0;
  for(const [lng,lat] of points){ sumLng+=lng; sumLat+=lat; }
  return { lng: sumLng/points.length, lat: sumLat/points.length };
}

async function focusCountryOnGlobe(globe, slug){
  const feature = featureBySlug[slug];
  if(!feature){ setStatus(`Not mapped on globe: ${slug}`); return; }

  hoveredFeature = feature;
  globe.polygonCapColor(globe.polygonCapColor());

  const c = centroidOfFeature(feature);
  if(c){
    globe.pointOfView({ lat: c.lat, lng: c.lng, altitude: 1.65 }, 750);
  }

  const displayName = feature.properties?.name || COUNTRIES_DB?.[slug]?.name || slug;
  const d = await loadDetails(slug);

  if(TOUCH_UI){
    pinnedSlug = slug;
    lastTapAt = Date.now();
    pinTooltip(tooltipHTML(displayName, slug, d, true));
    setStatus(`${displayName} — tap again to open`);
  } else {
    showTooltip(tooltipHTML(displayName, slug, d, false));
    setStatus(`${displayName} — click to open`);
    placeTooltipNearCursor();
  }
}

function setupSearch(globe){
  function renderList(items){
    if(!items.length){ acList.style.display="none"; return; }
    acList.innerHTML = items.map(c => `
      <div class="acItem" data-code="${esc(c.code)}">
        ${esc(c.name)}<small>${esc(c.code)}</small>
      </div>
    `).join("");
    acList.style.display="block";

    acList.querySelectorAll(".acItem").forEach(el => {
      el.addEventListener("click", async () => {
        const code = el.getAttribute("data-code");
        searchInput.value = (COUNTRIES_DB?.[code]?.name) || code;
        acList.style.display="none";
        await focusCountryOnGlobe(globe, code);
      });
    });
  }

  searchInput.addEventListener("input", () => {
    const q = searchInput.value.toLowerCase().trim();
    if(!q){ acList.style.display="none"; return; }

    const res = ALL.filter(c => {
      if(c.name.toLowerCase().includes(q)) return true;
      return (c.aliases||[]).some(a => String(a).toLowerCase().includes(q));
    }).slice(0, 12);

    renderList(res);
  });

  searchInput.addEventListener("blur", () => setTimeout(() => acList.style.display="none", 160));

  searchInput.addEventListener("keydown", async (e) => {
    if(e.key === "Enter"){
      const q = searchInput.value.toLowerCase().trim();
      if(!q) return;
      const hit = ALL.find(c => c.code === q)
        || ALL.find(c => c.name.toLowerCase() === q)
        || ALL.find(c => (c.aliases||[]).some(a => String(a).toLowerCase() === q));
      if(hit){
        acList.style.display="none";
        await focusCountryOnGlobe(globe, hit.code);
      }
    }
    if(e.key === "Escape"){ acList.style.display="none"; searchInput.blur(); }
  });
}

async function init(){
  setStatus("Loading...");

  await loadCountriesDB();

  const world = await fetch("https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson")
    .then(r => r.json());

  // build slug->feature index + match count
  featureBySlug = {};
  let matchCount = 0;
  world.features.forEach(f => {
    const dispName = f.properties?.name || "";
    const key = normName(dispName);
    const data = COUNTRY_MAP[key];
    if(data?.slug){
      matchCount++;
      if(!featureBySlug[data.slug]) featureBySlug[data.slug] = f;
    }
  });

  setStatus(`Ready — ${matchCount} countries clickable`);

  let hoverTimer = null;
  let lastHoverSlug = null;

  const globe = Globe()(document.getElementById("globe"))
    .backgroundColor("#06090f")
    .globeImageUrl("./assets/earth-grass.png")
    .bumpImageUrl("https://unpkg.com/three-globe/example/img/earth-topology.png")
    .showAtmosphere(true)
    .atmosphereAltitude(0.18)
    .polygonsData(world.features)
    .polygonAltitude(0.012)
    .polygonStrokeColor(() => "rgba(255,255,255,0.16)")
    .polygonSideColor(() => "rgba(255,255,255,0.03)")
    .polygonCapColor(f => {
      if (f !== hoveredFeature) return "rgba(0,0,0,0)";
      const name = normName(f.properties?.name || "");
      const data = COUNTRY_MAP[name];
      return data ? HOVER_COLORS[data.color] : "rgba(255,214,0,0.55)";
    })
    .onPolygonHover(f => {
      hoveredFeature = f || null;
      globe.polygonCapColor(globe.polygonCapColor());

      // On mobile pinned mode: ignore hover behavior
      if(TOUCH_UI) return;
      if(tooltipPinned) return;

      if(f){
        const dispName = f.properties?.name || "Unknown";
        const key = normName(dispName);
        const data = COUNTRY_MAP[key];

        if(!data){
          setStatus(dispName);
          showTooltip(`<div class="tt-title">${esc(dispName)}</div><div class="tt-foot"><span class="pill">Not mapped</span></div>`);
          return;
        }

        const slug = data.slug;
        setStatus(`${dispName} — click to open`);

        showTooltip(tooltipHTML(dispName, slug, detailsCache[slug] || null, false));

        clearTimeout(hoverTimer);
        lastHoverSlug = slug;
        hoverTimer = setTimeout(async () => {
          const d = await loadDetails(slug);
          if(lastHoverSlug === slug && !tooltipPinned){
            showTooltip(tooltipHTML(dispName, slug, d, false));
          }
        }, 160);

      } else {
        hideTooltip();
      }
    })
    .onPolygonClick(async f => {
      if(!f) return;

      const dispName = f.properties?.name || "Unknown";
      const key = normName(dispName);
      const data = COUNTRY_MAP[key];
      if(!data) return;

      const slug = data.slug;

      // MOBILE: 1st tap pin, 2nd tap open
      if(TOUCH_UI){
        const now = Date.now();
        const same = (pinnedSlug === slug) && (now - lastTapAt < 1500);

        if(!tooltipPinned || !same){
          pinnedSlug = slug;
          lastTapAt = now;
          const d = await loadDetails(slug);
          pinTooltip(tooltipHTML(dispName, slug, d, true));
          setStatus(`${dispName} — tap again to open`);
          return;
        }

        window.location.href = `/countries/country.html?country=${slug}`;
        return;
      }

      // DESKTOP: single click opens
      window.location.href = `/countries/country.html?country=${slug}`;
    });

  // Search focuses globe (no navigation)
  setupSearch(globe);

  // Slower rotation
  globe.controls().autoRotate = true;
  globe.controls().autoRotateSpeed = 0.25;

  // Bump animation (unchanged)
  const scene = globe.scene();
  const g = scene.children.find(o => o.type === 'Mesh' && o.geometry?.type === 'SphereGeometry');
  if (g?.material) {
    g.material.bumpScale = 0.18;
    let t = 0;
    function animate(){
      t += 0.015;
      if (g?.material) g.material.bumpScale = 0.16 + Math.sin(t) * 0.03;
      requestAnimationFrame(animate);
    }
    animate();
  }
}

init().catch(err => {
  console.error(err);
  setStatus("Error: " + err.message);
});
</script>
