  <style>
    :root{
      --bg:#f5f1e8;
      --bg-soft:#fbf8f2;
      --paper:#fffdf8;
      --paper-2:#f7f1e7;
      --ink:#171714;
      --ink-soft:#4e504b;
      --line:rgba(23,23,20,.10);
      --line-strong:rgba(23,23,20,.18);
      --green:#1d7f48;
      --green-soft:rgba(29,127,72,.10);
      --shadow-1:0 10px 30px rgba(25,20,12,.06);
      --shadow-2:0 24px 70px rgba(25,20,12,.10);

      --theme-visa:#178a5b;
      --theme-nomad:#0f82a2;
      --theme-future:#7d55d8;
      --theme-family:#d7731d;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    *::before,*::after{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      font-family:"Inter",system-ui,sans-serif;
      color:var(--ink);
      min-height:100vh;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.85), transparent 30%),
        radial-gradient(circle at top right, rgba(29,127,72,.05), transparent 24%),
        linear-gradient(180deg, #f8f4ec 0%, #f3eee4 100%);
      -webkit-font-smoothing:antialiased;
      overflow-x:hidden;
    }
    a{text-decoration:none;color:inherit}

    .cw{
      width:min(1280px, calc(100% - 40px));
      margin:0 auto;
      padding:28px 0 88px;
    }
    @media (max-width:700px){
      .cw{
        width:min(100% - 24px, 1280px);
        padding:14px 0 54px;
      }
    }

    /* ===== Masthead ===== */
    .masthead{
      position:relative;
      margin:14px 0 28px;
      border:1px solid rgba(23,23,20,.08);
      background:
        linear-gradient(180deg, rgba(255,255,255,.75), rgba(255,255,255,.68)),
        linear-gradient(135deg, rgba(29,127,72,.035), transparent 32%);
      box-shadow:var(--shadow-1);
      border-radius:28px;
      overflow:hidden;
    }
    .masthead::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 85% 18%, rgba(29,127,72,.06), transparent 18%),
        radial-gradient(circle at 10% 90%, rgba(0,0,0,.03), transparent 24%);
      pointer-events:none;
    }
    .masthead-inner{
      position:relative;
      z-index:1;
      display:grid;
      grid-template-columns:minmax(0, 1fr) 340px;
      gap:0;
      padding:32px 0 26px 36px;
      align-items:stretch;
    }
    @media (max-width:980px){
      .masthead-inner{
        grid-template-columns:1fr;
        gap:0;
        padding:24px 22px 20px;
      }
    }

    .masthead-copy{
      max-width:680px;
      padding-right:32px;
      padding-bottom:6px;
    }
    @media (max-width:980px){
      .masthead-copy{ padding-right:0; }
    }

    .masthead-label{
      display:inline-flex;
      align-items:center;
      gap:12px;
      font-size:11px;
      font-weight:800;
      letter-spacing:.24em;
      text-transform:uppercase;
      color:var(--green);
      margin-bottom:14px;
    }
    .masthead-label::before{
      content:"";
      width:28px;
      height:1px;
      background:rgba(29,127,72,.55);
      display:block;
    }

    .masthead h1{
      font-family:"Playfair Display", Georgia, serif;
      font-size:clamp(32px, 5vw, 66px);
      line-height:.96;
      letter-spacing:-.03em;
      font-weight:700;
      max-width:10ch;
      margin-bottom:12px;
    }
    .masthead h1 em{
      color:var(--green);
      font-style:italic;
      font-weight:700;
    }

    .masthead-sub{
      max-width:54ch;
      font-size:14px;
      line-height:1.76;
      color:var(--ink-soft);
      margin-bottom:22px;
    }

    .masthead-search{
      position:relative;
      max-width:380px;
    }
    .masthead-search svg{
      position:absolute;
      left:15px;
      top:50%;
      transform:translateY(-50%);
      color:rgba(23,23,20,.42);
      pointer-events:none;
    }
    .masthead-search input{
      width:100%;
      height:46px;
      border:none;
      outline:none;
      border-radius:14px;
      background:rgba(255,255,255,.84);
      box-shadow:
        inset 0 0 0 1px rgba(23,23,20,.09),
        0 8px 20px rgba(23,23,20,.04);
      padding:0 16px 0 46px;
      font:600 14px "Inter",system-ui,sans-serif;
      color:var(--ink);
      transition:box-shadow .18s ease;
      backdrop-filter: blur(8px);
    }
    .masthead-search input::placeholder{
      color:rgba(23,23,20,.42);
    }
    .masthead-search input:focus{
      box-shadow:
        inset 0 0 0 1px rgba(29,127,72,.28),
        0 0 0 4px rgba(29,127,72,.08),
        0 10px 24px rgba(23,23,20,.05);
    }

    /* ── Image bannière ── */
    .masthead-img{
      align-self:stretch;
      overflow:hidden;
      border-left:1px solid rgba(23,23,20,.07);
      margin-top:-32px;
      margin-bottom:-26px;
      margin-right:0;
    }
    .masthead-img img{
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center top;
      display:block;
    }
    @media (max-width:980px){
      .masthead-img{ display:none; }
    }

    .masthead-rule{
      display:flex;
      align-items:center;
      gap:14px;
      padding:0 36px 20px;
    }
    .masthead-rule::before,
    .masthead-rule::after{
      content:"";
      flex:1;
      height:1px;
      background:var(--line);
    }
    .masthead-rule-dot{
      width:7px;
      height:7px;
      border-radius:50%;
      background:var(--green);
      box-shadow:0 0 0 6px rgba(29,127,72,.08);
      flex:0 0 auto;
    }
    @media (max-width:980px){
      .masthead-rule{padding:0 22px 18px}
    }

    /* ===== Filters ===== */
    .filterbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin:0 0 34px;
    }
    .fpill{
      border:none;
      outline:none;
      cursor:pointer;
      min-height:38px;
      padding:0 16px;
      border-radius:999px;
      background:rgba(255,255,255,.72);
      color:rgba(23,23,20,.66);
      font:700 11px/1 "Inter",system-ui,sans-serif;
      letter-spacing:.14em;
      text-transform:uppercase;
      box-shadow:
        inset 0 0 0 1px rgba(23,23,20,.08),
        0 8px 20px rgba(23,23,20,.03);
      transition:transform .15s ease, box-shadow .15s ease, color .15s ease, background .15s ease;
    }
    .fpill:hover{
      transform:translateY(-1px);
      color:var(--ink);
      background:#fff;
      box-shadow:
        inset 0 0 0 1px rgba(23,23,20,.12),
        0 12px 22px rgba(23,23,20,.05);
    }
    .fpill.on{
      color:#fff;
      background:linear-gradient(135deg, #228b51, #1d7f48);
      box-shadow:
        0 12px 26px rgba(29,127,72,.22),
        inset 0 1px 0 rgba(255,255,255,.18);
    }

    /* ===== Featured ===== */
    .feat-wrap{
      margin-bottom:38px;
    }
    .feat-card{
      position:relative;
      display:grid;
      grid-template-columns:minmax(0, 1.4fr) 320px;
      border-radius:30px;
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,251,244,.95));
      border:1px solid rgba(23,23,20,.08);
      box-shadow:var(--shadow-2);
      transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .feat-card:hover{
      transform:translateY(-2px);
      box-shadow:0 30px 80px rgba(25,20,12,.13);
      border-color:rgba(23,23,20,.14);
    }
    .feat-card::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at top right, rgba(29,127,72,.08), transparent 24%),
        linear-gradient(90deg, transparent, rgba(255,255,255,.2));
      pointer-events:none;
    }
    @media (max-width:960px){
      .feat-card{
        grid-template-columns:1fr;
      }
    }

    .feat-body{
      position:relative;
      z-index:1;
      padding:26px 28px 22px;
      display:flex;
      flex-direction:column;
      gap:18px;
    }
    @media (max-width:700px){
      .feat-body{
        padding:20px 18px 18px;
      }
    }

    .feat-topline{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .feat-kicker{
      display:inline-flex;
      align-items:center;
      height:28px;
      padding:0 12px;
      border-radius:999px;
      font-size:10px;
      font-weight:800;
      letter-spacing:.16em;
      text-transform:uppercase;
    }
    .feat-kicker-star{
      color:#fff;
      background:linear-gradient(135deg, #1f8b50, #186d40);
      box-shadow:0 10px 22px rgba(29,127,72,.18);
    }
    .feat-kicker-theme{
      color:var(--theme-color, var(--green));
      background:rgba(255,255,255,.72);
      box-shadow:inset 0 0 0 1px color-mix(in srgb, var(--theme-color, var(--green)) 18%, rgba(23,23,20,.08));
    }
    .feat-kicker-region{
      color:rgba(23,23,20,.52);
      background:rgba(255,255,255,.58);
      box-shadow:inset 0 0 0 1px rgba(23,23,20,.08);
    }

    .feat-title{
      font-family:"Playfair Display", Georgia, serif;
      font-size:clamp(22px, 2.8vw, 36px);
      line-height:1.08;
      letter-spacing:-.025em;
      font-weight:700;
      max-width:16ch;
    }
    .feat-excerpt{
      max-width:62ch;
      color:var(--ink-soft);
      font-size:15px;
      line-height:1.86;
    }
    .feat-footer{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      padding-top:8px;
      border-top:1px solid rgba(23,23,20,.08);
    }
    .feat-meta{
      font-size:11px;
      font-weight:700;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:rgba(23,23,20,.42);
    }
    .feat-cta{
      display:inline-flex;
      align-items:center;
      gap:10px;
      min-height:38px;
      padding:0 16px;
      border-radius:999px;
      background:#161714;
      color:#fff;
      font-size:11px;
      font-weight:800;
      letter-spacing:.16em;
      text-transform:uppercase;
      transition:transform .15s ease, opacity .15s ease;
      box-shadow:0 10px 22px rgba(23,23,20,.14);
      position:static;
    }
    .feat-cta:hover{
      transform:translateY(-1px);
      opacity:.94;
    }
    /* stretch-link : couvre toute la feat-card */
    .feat-cta::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
    }

    .feat-panel{
      position:relative;
      z-index:1;
      border-left:1px solid rgba(23,23,20,.08);
      background:
        linear-gradient(180deg, rgba(247,241,231,.88), rgba(255,255,255,.74));
      padding:20px 22px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:14px;
    }
    @media (max-width:960px){
      .feat-panel{
        border-left:none;
        border-top:1px solid rgba(23,23,20,.08);
        padding:18px 20px 22px;
        display:grid;
        grid-template-columns:repeat(3, 1fr);
      }
    }
    @media (max-width:560px){
      .feat-panel{
        grid-template-columns:1fr;
      }
    }

    .feat-panel-label{
      font-size:10px;
      font-weight:800;
      letter-spacing:.2em;
      text-transform:uppercase;
      color:rgba(23,23,20,.42);
      margin-bottom:2px;
    }
    .feat-stat{
      padding:14px 0;
      border-top:1px solid rgba(23,23,20,.08);
    }
    .feat-stat:first-of-type{
      border-top:none;
      padding-top:2px;
    }
    @media (max-width:960px){
      .feat-stat{
        border-top:none;
        padding:4px 0;
      }
    }
    .feat-stat-val{
      font-family:"Playfair Display", Georgia, serif;
      font-size:33px;
      line-height:1;
      letter-spacing:-.03em;
      color:var(--theme-color, var(--green));
      font-weight:700;
      margin-bottom:5px;
    }
    .feat-stat-label{
      font-size:10px;
      font-weight:800;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:rgba(23,23,20,.48);
      line-height:1.5;
    }

    /* ===== Section heading ===== */
    .sec-head{
      display:flex;
      align-items:center;
      gap:14px;
      margin:0 0 18px;
    }
    .sec-label{
      font-size:11px;
      font-weight:800;
      letter-spacing:.24em;
      text-transform:uppercase;
      color:rgba(23,23,20,.45);
      white-space:nowrap;
    }
    .sec-count{
      font-family:"Playfair Display", Georgia, serif;
      font-size:16px;
      color:var(--green);
      white-space:nowrap;
    }
    .sec-rule{
      height:1px;
      flex:1;
      background:linear-gradient(90deg, rgba(23,23,20,.12), rgba(23,23,20,.04));
    }

    /* ===== Grid ===== */
    .cw-grid{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:18px;
      align-items:stretch;
    }
    @media (max-width:1040px){
      .cw-grid{grid-template-columns:1fr 1fr}
    }
    @media (max-width:640px){
      .cw-grid{grid-template-columns:1fr}
    }

    .cw-card{
      position:relative;
      display:flex;
      flex-direction:column;
      min-height:100%;
      border-radius:24px;
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.94), rgba(255,252,247,.92));
      border:1px solid rgba(23,23,20,.08);
      box-shadow:0 10px 28px rgba(23,23,20,.05);
      transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .cw-card:hover{
      transform:translateY(-3px);
      border-color:rgba(23,23,20,.14);
      box-shadow:0 22px 46px rgba(23,23,20,.10);
    }
    .cw-card::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:3px;
      background:var(--card-accent, rgba(23,23,20,.1));
    }

    .card-head{
      padding:24px 22px 14px;
    }
    .card-theme{
      display:inline-flex;
      align-items:center;
      gap:8px;
      margin-bottom:14px;
      font-size:10px;
      font-weight:800;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:var(--card-accent, rgba(23,23,20,.54));
    }
    .card-theme-dot{
      width:6px;
      height:6px;
      border-radius:50%;
      background:currentColor;
      flex-shrink:0;
    }

    .cw-card h3{
      font-family:"Playfair Display", Georgia, serif;
      font-size:24px;
      line-height:1.16;
      letter-spacing:-.02em;
      font-weight:700;
      color:var(--ink);
    }

    .card-body{
      flex:1;
      padding:0 22px 18px;
    }
    .card-excerpt{
      color:var(--ink-soft);
      font-size:14px;
      line-height:1.82;
      display:-webkit-box;
      -webkit-line-clamp:4;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .card-footer{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:16px 22px 18px;
      border-top:1px solid rgba(23,23,20,.08);
    }
    .card-meta{
      font-size:10px;
      font-weight:800;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:rgba(23,23,20,.40);
    }
    .card-read{
      color:var(--card-accent, var(--green));
      font-size:11px;
      font-weight:800;
      letter-spacing:.16em;
      text-transform:uppercase;
      transition:letter-spacing .16s ease;
      flex-shrink:0;
      position:static;
    }
    .cw-card:hover .card-read{
      letter-spacing:.20em;
    }
    /* stretch-link : couvre toute la cw-card */
    .card-read::after{
      content:"";
      position:absolute;
      inset:0;
    }

    .t-visa   { --card-accent: var(--theme-visa); }
    .t-nomad  { --card-accent: var(--theme-nomad); }
    .t-future { --card-accent: var(--theme-future); }
    .t-family { --card-accent: var(--theme-family); }

    .cw-empty{
      display:none;
      grid-column:1 / -1;
      text-align:center;
      padding:56px 20px;
      border-radius:24px;
      border:1px dashed rgba(23,23,20,.16);
      color:rgba(23,23,20,.44);
      background:rgba(255,255,255,.56);
      font-weight:700;
    }

    @keyframes fadeUp{
      from{opacity:0;transform:translateY(16px)}
      to{opacity:1;transform:translateY(0)}
    }
    .masthead{animation:fadeUp .55s ease both}
    .filterbar{animation:fadeUp .55s .08s ease both}
    .feat-wrap{animation:fadeUp .55s .16s ease both}
    .sec-head{animation:fadeUp .55s .22s ease both}
    .cw-grid{animation:fadeUp .55s .28s ease both}
  </style>
</head>

    var THEME_CLASS = {
      "Visa & Installation": "t-visa",
      "Nomad Life":          "t-nomad",
      "Future & Strategy":   "t-future",
      "Family":              "t-family"
    };
    var THEME_COLOR = {
      "Visa & Installation": "#178a5b",
      "Nomad Life":          "#0f82a2",
      "Future & Strategy":   "#7d55d8",
      "Family":              "#d7731d"
    };

    var activeFilter = "all";

    function getLang() {
      return (localStorage.getItem("wigg_lang") || "en").toLowerCase();
    }
    function str(obj) {
      if (!obj) return "";
      if (typeof obj === "string") return obj;
      var l = getLang();
      return obj[l] || obj.en || "";
    }
    function tx() {
      var l = getLang();
      return I18N[l] || I18N.en;
    }
    function fmtDate(iso) {
      if (!iso) return "";
      var parts = iso.split("-").map(Number);
      var dt = new Date(Date.UTC(parts[0], parts[1] - 1, parts[2]));
      var l = getLang();
      var locale = l === "fr" ? "fr-FR" : l === "es" ? "es-ES" : "en-GB";
      return dt.toLocaleDateString(locale, { year: "numeric", month: "short", day: "numeric" });
    }

    function featuredHTML(c) {
      var t     = tx();
      var url   = str(c.url);
      var color = THEME_COLOR[c.theme] || "#1d7f48";
      var date  = c.date ? fmtDate(c.date) : "";

      var statsHTML = "";
      if (c.stats && c.stats.length) {
        statsHTML = c.stats.map(function(s) {
          return '<div class="feat-stat">' +
            '<div class="feat-stat-val">' + s.val + '</div>' +
            '<div class="feat-stat-label">' + s.label + '</div>' +
          '</div>';
        }).join("");
      } else {
        var readNum = c.read ? c.read.replace(/[^0-9]/g, "") : "";
        statsHTML = [
          '<div class="feat-stat"><div class="feat-stat-val">150+</div><div class="feat-stat-label">countries</div></div>',
          readNum ? '<div class="feat-stat"><div class="feat-stat-val">~' + readNum + '</div><div class="feat-stat-label">min read</div></div>' : ''
        ].join("");
      }

      return '<article class="feat-card" style="--theme-color:' + color + '">' +
        '<div class="feat-body">' +
          '<div class="feat-topline">' +
            '<span class="feat-kicker feat-kicker-star">' + t.featured + '</span>' +
            '<span class="feat-kicker feat-kicker-theme">' + (c.theme || "") + '</span>' +
            (c.region ? '<span class="feat-kicker feat-kicker-region">' + c.region + '</span>' : '') +
          '</div>' +
          '<div class="feat-title">' + str(c.title) + '</div>' +
          '<p class="feat-excerpt">' + str(c.excerpt) + '</p>' +
          '<div class="feat-footer">' +
            '<span class="feat-meta">' + (date || "") + (c.read ? " · " + c.read : "") + '</span>' +
            '<a class="feat-cta" href="' + url + '">' + t.read + '</a>' +
          '</div>' +
        '</div>' +
        '<aside class="feat-panel">' +
          '<div class="feat-panel-label">' + t.panel + '</div>' +
          statsHTML +
        '</aside>' +
      '</article>';
    }

    function cardHTML(c) {
      var t   = tx();
      var url = str(c.url);
      var cls = THEME_CLASS[c.theme] || "";
      var date = c.date ? fmtDate(c.date) : "";

      return '<article class="cw-card ' + cls + '" role="listitem">' +
        '<div class="card-head">' +
          '<div class="card-theme">' +
            '<span class="card-theme-dot"></span>' +
            (c.theme || "") +
          '</div>' +
          '<h3>' + str(c.title) + '</h3>' +
        '</div>' +
        '<div class="card-body">' +
          '<p class="card-excerpt">' + str(c.excerpt) + '</p>' +
        '</div>' +
        '<div class="card-footer">' +
          '<span class="card-meta">' + (date || "") + (c.read ? " · " + c.read : "") + '</span>' +
          '<a class="card-read" href="' + url + '">' + t.read + '</a>' +
        '</div>' +
      '</article>';
    }

    function matches(c) {
      var q = document.getElementById("searchInput").value.trim().toLowerCase();
      var hay = [str(c.title), str(c.excerpt), c.theme || "", c.region || ""].join(" ").toLowerCase();
      var qOk = !q || hay.indexOf(q) !== -1;
      var fOk = activeFilter === "all" || c.theme === activeFilter;
      return qOk && fOk;
    }

    function buildFilters() {
      var t = tx();
      var themes = [];
      CHRONICLES.forEach(function(c) {
        if (c.theme && themes.indexOf(c.theme) === -1) themes.push(c.theme);
      });

      var nav = document.getElementById("filters");
      nav.innerHTML = "";

      function makeBtn(label, val) {
        var btn = document.createElement("button");
        btn.className = "fpill" + (activeFilter === val ? " on" : "");
        btn.textContent = label;
        btn.addEventListener("click", function() {
          activeFilter = val;
          buildFilters();
          render();
        });
        nav.appendChild(btn);
      }

      makeBtn(t.all, "all");
      themes.forEach(function(th) { makeBtn(th, th); });
    }

    function render() {
      var t = tx();
      var featured = null;
      var rest = [];

      CHRONICLES.forEach(function(c) {
        if (c.featured) featured = c;
        else rest.push(c);
      });

      var featSec  = document.getElementById("featuredSection");
      var featCard = document.getElementById("featuredCard");

      if (featured) {
        var showFeat = matches(featured);
        featSec.style.display = showFeat ? "" : "none";
        if (showFeat) featCard.innerHTML = featuredHTML(featured);
      } else {
        featSec.style.display = "none";
      }

      var filtered = rest.filter(matches);
      var grid = document.getElementById("grid");
      var emptyEl = document.getElementById("empty");

      if (filtered.length === 0) {
        grid.innerHTML = "";
        emptyEl.style.display = "block";
        emptyEl.textContent = t.empty;
        grid.appendChild(emptyEl);
      } else {
        grid.innerHTML = filtered.map(cardHTML).join("");
        emptyEl.style.display = "none";
      }

      document.getElementById("countBadge").textContent = filtered.length;
      document.getElementById("sectionLabel").textContent = t.section;
    }

    function applyI18n() {
      var t = tx();
      var l = getLang();
      document.documentElement.lang = l;
      document.getElementById("eyebrow").textContent = t.eyebrow;
      document.getElementById("heroTitle").innerHTML = "Wigg <em>" + (l === "fr" ? "Chroniques" : l === "es" ? "Crónicas" : "Chronicles") + "</em>";
      document.getElementById("heroSub").textContent = t.sub;
      document.getElementById("searchInput").placeholder = t.search;
    }

    function init() {
      applyI18n();
      buildFilters();
      render();
    }

    init();

    document.getElementById("searchInput").addEventListener("input", render);

    window.addEventListener("wigg_lang_changed", function() {
      applyI18n();
      buildFilters();
      render();
    });
  </script>
