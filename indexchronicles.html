  <style>
    :root{
      --bg:#f6f1e8;
      --bg-soft:#fbf8f2;
      --paper:#fffdf8;
      --paper-2:#f8f2e9;
      --ink:#171714;
      --ink-soft:#54554e;
      --line:rgba(23,23,20,.10);
      --green:#1d7f48;
      --green-soft:rgba(29,127,72,.10);
      --shadow-1:0 12px 34px rgba(25,20,12,.06);
      --shadow-2:0 24px 70px rgba(25,20,12,.10);

      --theme-visa:#178a5b;
      --theme-nomad:#0f82a2;
      --theme-future:#7d55d8;
      --theme-family:#d7731d;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    *::before,*::after{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      font-family:"Inter",system-ui,sans-serif;
      color:var(--ink);
      min-height:100vh;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.9), transparent 28%),
        radial-gradient(circle at top right, rgba(29,127,72,.045), transparent 22%),
        linear-gradient(180deg, #f9f5ed 0%, #f3ede3 100%);
      -webkit-font-smoothing:antialiased;
      overflow-x:hidden;
    }

    a{text-decoration:none;color:inherit}

    .cw{
      width:min(1280px, calc(100% - 40px));
      margin:0 auto;
      padding:28px 0 88px;
    }

    @media (max-width:700px){
      .cw{
        width:min(100% - 24px, 1280px);
        padding:14px 0 54px;
      }
    }

    /* ===== MASTHEAD ===== */
    .masthead{
      position:relative;
      margin:14px 0 28px;
      border:1px solid rgba(23,23,20,.07);
      background:
        linear-gradient(180deg, rgba(255,255,255,.82), rgba(255,255,255,.72)),
        linear-gradient(135deg, rgba(29,127,72,.03), transparent 34%);
      box-shadow:var(--shadow-1);
      border-radius:30px;
      overflow:hidden;
    }

    .masthead::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 88% 18%, rgba(29,127,72,.05), transparent 18%),
        radial-gradient(circle at 8% 92%, rgba(0,0,0,.025), transparent 24%);
      pointer-events:none;
    }

    .masthead-inner{
      position:relative;
      z-index:1;
      display:grid;
      grid-template-columns:minmax(0, 1.05fr) minmax(320px, 470px);
      gap:26px;
      align-items:stretch;
      padding:24px;
    }

    .masthead-copy{
      min-width:0;
      padding:18px 14px 14px 14px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .masthead-label{
      display:inline-flex;
      align-items:center;
      gap:12px;
      font-size:11px;
      font-weight:800;
      letter-spacing:.24em;
      text-transform:uppercase;
      color:var(--green);
      margin-bottom:16px;
    }

    .masthead-label::before{
      content:"";
      width:28px;
      height:1px;
      background:rgba(29,127,72,.55);
      display:block;
    }

    .masthead h1{
      font-family:"Playfair Display", Georgia, serif;
      font-size:clamp(42px, 6vw, 82px);
      line-height:.92;
      letter-spacing:-.04em;
      font-weight:700;
      max-width:8.5ch;
      margin-bottom:16px;
    }

    .masthead h1 em{
      color:var(--green);
      font-style:italic;
      font-weight:700;
    }

    .masthead-sub{
      max-width:58ch;
      font-size:15px;
      line-height:1.85;
      color:var(--ink-soft);
      margin-bottom:24px;
    }

    .masthead-search{
      position:relative;
      max-width:430px;
    }

    .masthead-search svg{
      position:absolute;
      left:15px;
      top:50%;
      transform:translateY(-50%);
      color:rgba(23,23,20,.42);
      pointer-events:none;
    }

    .masthead-search input{
      width:100%;
      height:52px;
      border:none;
      outline:none;
      border-radius:15px;
      background:rgba(255,255,255,.88);
      box-shadow:
        inset 0 0 0 1px rgba(23,23,20,.08),
        0 8px 18px rgba(23,23,20,.03);
      padding:0 16px 0 46px;
      font:600 14px "Inter",system-ui,sans-serif;
      color:var(--ink);
      transition:box-shadow .18s ease;
    }

    .masthead-search input::placeholder{
      color:rgba(23,23,20,.42);
    }

    .masthead-search input:focus{
      box-shadow:
        inset 0 0 0 1px rgba(29,127,72,.28),
        0 0 0 4px rgba(29,127,72,.08),
        0 10px 24px rgba(23,23,20,.05);
    }

    .masthead-media{
      min-width:0;
      display:flex;
      align-items:stretch;
    }

    .masthead-art{
      position:relative;
      width:100%;
      min-height:320px;
      border-radius:24px;
      overflow:hidden;
      border:1px solid rgba(23,23,20,.06);
      box-shadow:
        0 14px 34px rgba(23,23,20,.06),
        inset 0 1px 0 rgba(255,255,255,.55);
      background:#efe7da;
    }

    .masthead-art::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(135deg, rgba(255,255,255,.16), transparent 30%),
        linear-gradient(0deg, rgba(255,250,244,.10), rgba(255,250,244,.10));
      pointer-events:none;
    }

    .masthead-art img{
      display:block;
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center;
    }

    .masthead-rule{
      display:flex;
      align-items:center;
      gap:14px;
      padding:0 28px 22px;
    }

    .masthead-rule::before,
    .masthead-rule::after{
      content:"";
      flex:1;
      height:1px;
      background:var(--line);
    }

    .masthead-rule-dot{
      width:7px;
      height:7px;
      border-radius:50%;
      background:var(--green);
      box-shadow:0 0 0 6px rgba(29,127,72,.08);
      flex:0 0 auto;
    }

    @media (max-width:980px){
      .masthead-inner{
        grid-template-columns:1fr;
        gap:16px;
      }

      .masthead-copy{
        padding:6px 4px 0;
      }

      .masthead-art{
        min-height:230px;
      }
    }

    @media (max-width:640px){
      .masthead{
        border-radius:24px;
      }

      .masthead-inner{
        padding:16px;
      }

      .masthead h1{
        font-size:clamp(34px, 12vw, 56px);
        max-width:9ch;
      }

      .masthead-sub{
        font-size:14px;
        line-height:1.7;
      }

      .masthead-art{
        min-height:190px;
        border-radius:18px;
      }

      .masthead-rule{
        padding:0 16px 16px;
      }
    }

    /* ===== FILTERS ===== */
    .filterbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin:0 0 34px;
    }

    .fpill{
      border:none;
      outline:none;
      cursor:pointer;
      min-height:38px;
      padding:0 16px;
      border-radius:999px;
      background:rgba(255,255,255,.72);
      color:rgba(23,23,20,.66);
      font:700 11px/1 "Inter",system-ui,sans-serif;
      letter-spacing:.14em;
      text-transform:uppercase;
      box-shadow:
        inset 0 0 0 1px rgba(23,23,20,.08),
        0 8px 20px rgba(23,23,20,.03);
      transition:transform .15s ease, box-shadow .15s ease, color .15s ease, background .15s ease;
    }

    .fpill:hover{
      transform:translateY(-1px);
      color:var(--ink);
      background:#fff;
      box-shadow:
        inset 0 0 0 1px rgba(23,23,20,.12),
        0 12px 22px rgba(23,23,20,.05);
    }

    .fpill.on{
      color:#fff;
      background:linear-gradient(135deg, #228b51, #1d7f48);
      box-shadow:
        0 12px 26px rgba(29,127,72,.22),
        inset 0 1px 0 rgba(255,255,255,.18);
    }

    /* ===== FEATURED ===== */
    .feat-wrap{
      margin-bottom:38px;
    }

    .feat-card{
      position:relative;
      display:grid;
      grid-template-columns:minmax(0, 1.4fr) 320px;
      border-radius:30px;
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,251,244,.95));
      border:1px solid rgba(23,23,20,.08);
      box-shadow:var(--shadow-2);
      transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }

    .feat-card:hover{
      transform:translateY(-2px);
      box-shadow:0 30px 80px rgba(25,20,12,.13);
      border-color:rgba(23,23,20,.14);
    }

    .feat-card::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at top right, rgba(29,127,72,.08), transparent 24%),
        linear-gradient(90deg, transparent, rgba(255,255,255,.18));
      pointer-events:none;
    }

    @media (max-width:960px){
      .feat-card{
        grid-template-columns:1fr;
      }
    }

    .feat-body{
      position:relative;
      z-index:1;
      padding:26px 28px 22px;
      display:flex;
      flex-direction:column;
      gap:18px;
      min-width:0;
    }

    @media (max-width:700px){
      .feat-body{
        padding:20px 18px 18px;
      }
    }

    .feat-topline{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .feat-kicker{
      display:inline-flex;
      align-items:center;
      height:28px;
      padding:0 12px;
      border-radius:999px;
      font-size:10px;
      font-weight:800;
      letter-spacing:.16em;
      text-transform:uppercase;
    }

    .feat-kicker-star{
      color:#fff;
      background:linear-gradient(135deg, #1f8b50, #186d40);
      box-shadow:0 10px 22px rgba(29,127,72,.18);
    }

    .feat-kicker-theme{
      color:var(--theme-color, var(--green));
      background:rgba(255,255,255,.72);
      box-shadow:inset 0 0 0 1px rgba(23,23,20,.08);
    }

    .feat-kicker-region{
      color:rgba(23,23,20,.52);
      background:rgba(255,255,255,.58);
      box-shadow:inset 0 0 0 1px rgba(23,23,20,.08);
    }

    .feat-title{
      font-family:"Playfair Display", Georgia, serif;
      font-size:clamp(22px, 2.8vw, 36px);
      line-height:1.08;
      letter-spacing:-.025em;
      font-weight:700;
      max-width:16ch;
    }

    .feat-excerpt{
      max-width:62ch;
      color:var(--ink-soft);
      font-size:15px;
      line-height:1.86;
    }

    .feat-footer{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      padding-top:10px;
      border-top:1px solid rgba(23,23,20,.08);
    }

    .feat-meta{
      font-size:11px;
      font-weight:700;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:rgba(23,23,20,.42);
    }

    .feat-cta{
      display:inline-flex;
      align-items:center;
      gap:10px;
      min-height:42px;
      padding:0 18px;
      border-radius:999px;
      background:#161714;
      color:#fff;
      font-size:11px;
      font-weight:800;
      letter-spacing:.16em;
      text-transform:uppercase;
      transition:transform .15s ease, opacity .15s ease;
      box-shadow:0 12px 24px rgba(23,23,20,.16);
      position:relative;
      z-index:2;
    }

    .feat-cta:hover{
      transform:translateY(-1px);
      opacity:.94;
    }

    .feat-panel{
      position:relative;
      z-index:1;
      border-left:1px solid rgba(23,23,20,.08);
      background:
        linear-gradient(180deg, rgba(247,241,231,.88), rgba(255,255,255,.74));
      padding:20px 22px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:14px;
    }

    @media (max-width:960px){
      .feat-panel{
        border-left:none;
        border-top:1px solid rgba(23,23,20,.08);
        padding:18px 20px 22px;
        display:grid;
        grid-template-columns:repeat(3, 1fr);
      }
    }

    @media (max-width:560px){
      .feat-panel{
        grid-template-columns:1fr;
      }
    }

    .feat-panel-label{
      font-size:10px;
      font-weight:800;
      letter-spacing:.2em;
      text-transform:uppercase;
      color:rgba(23,23,20,.42);
      margin-bottom:2px;
    }

    .feat-stat{
      padding:14px 0;
      border-top:1px solid rgba(23,23,20,.08);
    }

    .feat-stat:first-of-type{
      border-top:none;
      padding-top:2px;
    }

    @media (max-width:960px){
      .feat-stat{
        border-top:none;
        padding:4px 0;
      }
    }

    .feat-stat-val{
      font-family:"Playfair Display", Georgia, serif;
      font-size:33px;
      line-height:1;
      letter-spacing:-.03em;
      color:var(--theme-color, var(--green));
      font-weight:700;
      margin-bottom:5px;
    }

    .feat-stat-label{
      font-size:10px;
      font-weight:800;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:rgba(23,23,20,.48);
      line-height:1.5;
    }

    /* ===== SECTION HEAD ===== */
    .sec-head{
      display:flex;
      align-items:center;
      gap:14px;
      margin:0 0 18px;
    }

    .sec-label{
      font-size:11px;
      font-weight:800;
      letter-spacing:.24em;
      text-transform:uppercase;
      color:rgba(23,23,20,.45);
      white-space:nowrap;
    }

    .sec-count{
      font-family:"Playfair Display", Georgia, serif;
      font-size:16px;
      color:var(--green);
      white-space:nowrap;
    }

    .sec-rule{
      height:1px;
      flex:1;
      background:linear-gradient(90deg, rgba(23,23,20,.12), rgba(23,23,20,.04));
    }

    /* ===== GRID ===== */
    .cw-grid{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:18px;
      align-items:stretch;
    }

    @media (max-width:1040px){
      .cw-grid{grid-template-columns:1fr 1fr}
    }

    @media (max-width:640px){
      .cw-grid{grid-template-columns:1fr}
    }

    .cw-card{
      position:relative;
      display:flex;
      flex-direction:column;
      min-height:100%;
      border-radius:24px;
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.94), rgba(255,252,247,.92));
      border:1px solid rgba(23,23,20,.08);
      box-shadow:0 10px 28px rgba(23,23,20,.05);
      transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }

    .cw-card:hover{
      transform:translateY(-3px);
      border-color:rgba(23,23,20,.14);
      box-shadow:0 22px 46px rgba(23,23,20,.10);
    }

    .cw-card::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:3px;
      background:var(--card-accent, rgba(23,23,20,.1));
    }

    .card-head{
      padding:24px 22px 14px;
    }

    .card-theme{
      display:inline-flex;
      align-items:center;
      gap:8px;
      margin-bottom:14px;
      font-size:10px;
      font-weight:800;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:var(--card-accent, rgba(23,23,20,.54));
    }

    .card-theme-dot{
      width:6px;
      height:6px;
      border-radius:50%;
      background:currentColor;
      flex-shrink:0;
    }

    .cw-card h3{
      font-family:"Playfair Display", Georgia, serif;
      font-size:24px;
      line-height:1.16;
      letter-spacing:-.02em;
      font-weight:700;
      color:var(--ink);
    }

    .card-body{
      flex:1;
      padding:0 22px 18px;
    }

    .card-excerpt{
      color:var(--ink-soft);
      font-size:14px;
      line-height:1.82;
      display:-webkit-box;
      -webkit-line-clamp:4;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .card-footer{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:16px 22px 18px;
      border-top:1px solid rgba(23,23,20,.08);
    }

    .card-meta{
      font-size:10px;
      font-weight:800;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:rgba(23,23,20,.40);
    }

    .card-read{
      color:var(--card-accent, var(--green));
      font-size:11px;
      font-weight:800;
      letter-spacing:.16em;
      text-transform:uppercase;
      transition:letter-spacing .16s ease;
      flex-shrink:0;
      position:relative;
      z-index:2;
    }

    .cw-card:hover .card-read{
      letter-spacing:.20em;
    }

    .t-visa   { --card-accent: var(--theme-visa); }
    .t-nomad  { --card-accent: var(--theme-nomad); }
    .t-future { --card-accent: var(--theme-future); }
    .t-family { --card-accent: var(--theme-family); }

    .cw-empty{
      display:none;
      grid-column:1 / -1;
      text-align:center;
      padding:56px 20px;
      border-radius:24px;
      border:1px dashed rgba(23,23,20,.16);
      color:rgba(23,23,20,.44);
      background:rgba(255,255,255,.56);
      font-weight:700;
    }

    @keyframes fadeUp{
      from{opacity:0;transform:translateY(16px)}
      to{opacity:1;transform:translateY(0)}
    }

    .masthead{animation:fadeUp .55s ease both}
    .filterbar{animation:fadeUp .55s .08s ease both}
    .feat-wrap{animation:fadeUp .55s .16s ease both}
    .sec-head{animation:fadeUp .55s .22s ease both}
    .cw-grid{animation:fadeUp .55s .28s ease both}
  </style>
</head>

<body>
  <noscript>
    <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-K4MMRD4R"
      height="0" width="0" style="display:none;visibility:hidden"></iframe>
  </noscript>

  <div id="siteHeader"></div>

  <main class="cw">
    <header class="masthead">
      <div class="masthead-inner">
        <div class="masthead-copy">
          <p class="masthead-label" id="eyebrow">Chroniques</p>
          <h1 id="heroTitle">Wigg <em>Chroniques</em></h1>
          <p class="masthead-sub" id="heroSub">

          </p>

          <div class="masthead-search">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input id="searchInput" type="search" autocomplete="off" aria-label="Search articles" placeholder="Rechercher des articles…">
          </div>

      <div class="masthead-rule">
        <div class="masthead-rule-dot"></div>
      </div>
    </header>

    <nav class="filterbar" id="filters" aria-label="Filter by category"></nav>

    <section class="feat-wrap" id="featuredSection">
      <div id="featuredCard"></div>
    </section>

    <div class="sec-head">
      <p class="sec-label" id="sectionLabel">Articles</p>

    </div>

    <div class="cw-grid" id="grid" role="list">
      <div class="cw-empty" id="empty">Aucun article ne correspond à ta recherche.</div>
    </div>
  </main>

  <script src="/data/header.js"></script>

  <script>
    const I18N = {
      en: {
        eyebrow:  "Chronicles",
        titleWord:"Chronicles",
        sub:      "Premium articles on expat life, visas, taxes, cost of living, future trends, education and quality of life.",
        search:   "Search articles…",
        all:      "All",

    const THEME_CLASS = {
      "Visa & Installation": "t-visa",
      "Nomad Life": "t-nomad",
      "Future & Strategy": "t-future",
      "Family": "t-family"
    };

    const THEME_COLOR = {
      "Visa & Installation": "#178a5b",
      "Nomad Life": "#0f82a2",
      "Future & Strategy": "#7d55d8",
      "Family": "#d7731d"
    };

    let activeFilter = "all";

    function getLang() {
      return (localStorage.getItem("wigg_lang") || "en").toLowerCase();
    }

    function str(obj) {
      if (!obj) return "";
      if (typeof obj === "string") return obj;
      const l = getLang();
      return obj[l] || obj.en || "";
    }

    function tx() {
      const l = getLang();
      return I18N[l] || I18N.en;
    }

    function fmtDate(iso) {
      if (!iso) return "";
      const parts = iso.split("-").map(Number);
      const dt = new Date(Date.UTC(parts[0], parts[1] - 1, parts[2]));
      const l = getLang();
      const locale = l === "fr" ? "fr-FR" : l === "es" ? "es-ES" : "en-GB";
      return dt.toLocaleDateString(locale, { year: "numeric", month: "short", day: "numeric" });
    }

    function featuredHTML(c) {
      const t = tx();
      const url = str(c.url);
      const color = THEME_COLOR[c.theme] || "#1d7f48";
      const date = c.date ? fmtDate(c.date) : "";

      let yearsLabel = t.statsYears;
      let countriesLabel = t.statsCountries;
      let readLabel = t.statsRead;

      return `
        <article class="feat-card" style="--theme-color:${color}">
          <div class="feat-body">
            <div class="feat-topline">
              <span class="feat-kicker feat-kicker-star">${t.featured}</span>
              <span class="feat-kicker feat-kicker-theme">${c.theme || ""}</span>
              ${c.region ? `<span class="feat-kicker feat-kicker-region">${c.region}</span>` : ""}
            </div>

            <div class="feat-title">${str(c.title)}</div>
            <p class="feat-excerpt">${str(c.excerpt)}</p>

            <div class="feat-footer">
              <span class="feat-meta">${date}${c.read ? " · " + c.read : ""}</span>
              <a class="feat-cta" href="${url}">${t.read}</a>
            </div>
          </div>

          <aside class="feat-panel">
            <div class="feat-panel-label">${t.panel}</div>
            <div class="feat-stat">
              <div class="feat-stat-val">150+</div>
              <div class="feat-stat-label">${countriesLabel}</div>
            </div>
            <div class="feat-stat">
              <div class="feat-stat-val">~30</div>
              <div class="feat-stat-label">${readLabel}</div>
            </div>
          </aside>
        </article>
      `;
    }

    function cardHTML(c) {
      const t = tx();
      const url = str(c.url);
      const cls = THEME_CLASS[c.theme] || "";
      const date = c.date ? fmtDate(c.date) : "";

      return `
        <article class="cw-card ${cls}" role="listitem">
          <div class="card-head">
            <div class="card-theme">
              <span class="card-theme-dot"></span>
              ${c.theme || ""}
            </div>
            <h3>${str(c.title)}</h3>
          </div>
          <div class="card-body">
            <p class="card-excerpt">${str(c.excerpt)}</p>
          </div>
          <div class="card-footer">
            <span class="card-meta">${date}${c.read ? " · " + c.read : ""}</span>
            <a class="card-read" href="${url}">${t.read}</a>
          </div>
        </article>
      `;
    }

    function matches(c) {
      const q = document.getElementById("searchInput").value.trim().toLowerCase();
      const hay = [str(c.title), str(c.excerpt), c.theme || "", c.region || ""].join(" ").toLowerCase();
      const qOk = !q || hay.includes(q);
      const fOk = activeFilter === "all" || c.theme === activeFilter;
      return qOk && fOk;
    }

    function buildFilters() {
      const t = tx();
      const themes = [];

      CHRONICLES.forEach(function(c) {
        if (c.theme && !themes.includes(c.theme)) themes.push(c.theme);
      });

      const nav = document.getElementById("filters");
      nav.innerHTML = "";

      function makeBtn(label, val) {
        const btn = document.createElement("button");
        btn.className = "fpill" + (activeFilter === val ? " on" : "");
        btn.textContent = label;
        btn.addEventListener("click", function() {
          activeFilter = val;
          buildFilters();
          render();
        });
        nav.appendChild(btn);
      }

      makeBtn(t.all, "all");
      themes.forEach(function(th) { makeBtn(th, th); });
    }

    function render() {
      const t = tx();
      let featured = null;
      let rest = [];

      CHRONICLES.forEach(function(c) {
        if (c.featured) featured = c;
        else rest.push(c);
      });

      const featSec = document.getElementById("featuredSection");
      const featCard = document.getElementById("featuredCard");

      if (featured) {
        const showFeat = matches(featured);
        featSec.style.display = showFeat ? "" : "none";
        if (showFeat) featCard.innerHTML = featuredHTML(featured);
      } else {
        featSec.style.display = "none";
      }

      const filtered = rest.filter(matches);
      const grid = document.getElementById("grid");
      const emptyEl = document.getElementById("empty");

      if (filtered.length === 0) {
        grid.innerHTML = "";
        emptyEl.style.display = "block";
        emptyEl.textContent = t.empty;
        grid.appendChild(emptyEl);
      } else {
        grid.innerHTML = filtered.map(cardHTML).join("");
        emptyEl.style.display = "none";
      }

      document.getElementById("countBadge").textContent = filtered.length;
      document.getElementById("sectionLabel").textContent = t.section;
    }

    function applyI18n() {
      const t = tx();
      const l = getLang();

      document.documentElement.lang = l;
      document.getElementById("eyebrow").textContent = t.eyebrow;
      document.getElementById("heroTitle").innerHTML = "Wigg <em>" + t.titleWord + "</em>";
      document.getElementById("heroSub").textContent = t.sub;
      document.getElementById("searchInput").placeholder = t.search;
      document.getElementById("sectionLabel").textContent = t.section;
      document.getElementById("empty").textContent = t.empty;
    }

    function init() {
      applyI18n();
      buildFilters();
      render();
    }

    init();

    document.getElementById("searchInput").addEventListener("input", render);

    window.addEventListener("wigg_lang_changed", function() {
      applyI18n();
      buildFilters();
      render();
    });
  </script>
