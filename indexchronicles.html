  <style>
    /* ── Tokens ─────────────────────────────────────────────── */
    :root {
      --bg:        #f7f9f7;
      --bg2:       #eef2ee;
      --bg3:       #ffffff;
      --green:     #22c55e;
      --green-dim: rgba(34,197,94,.12);
      --green-glow:rgba(34,197,94,.08);
      --ink:       #111c14;
      --muted:     #6b7a6c;
      --border:    rgba(0,0,0,.08);
      --border2:   rgba(0,0,0,.14);

      --theme-visa:   #0d9e6e;
      --theme-nomad:  #0891b2;
      --theme-future: #7c3aed;
      --theme-family: #ea6c0a;
    }

    /* ── Reset ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: "Syne", system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }

    /* ── Page wrapper ───────────────────────────────────────── */
    .cw {
      max-width: 1240px;
      margin: 0 auto;
      padding: 28px 24px 80px;
    }
    @media (max-width: 520px) { .cw { padding: 16px 14px 56px; } }

    /* ═══════════════════════════════════════════════════════════
       MASTHEAD
    ═══════════════════════════════════════════════════════════ */
    .masthead {
      position: relative;
      padding: 52px 0 40px;
      overflow: hidden;
    }

    /* Vertical rule on left */
    .masthead::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(to bottom, var(--green) 0%, transparent 100%);
      border-radius: 3px;
    }

    .masthead-inner {
      padding-left: 28px;
    }

    .masthead-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 16px;
    }
    .masthead-label span {
      display: inline-block;
      width: 18px;
      height: 1px;
      background: var(--green);
      opacity: .7;
    }

    .masthead h1 {
      font-family: "Playfair Display", Georgia, serif;
      font-weight: 900;
      font-size: clamp(44px, 7vw, 82px);
      letter-spacing: -.02em;
      line-height: 1.0;
      color: var(--ink);
      margin-bottom: 18px;
    }

    .masthead h1 em {
      font-style: italic;
      color: var(--green);
    }

    .masthead-sub {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.8;
      color: var(--muted);
      max-width: 56ch;
      margin-bottom: 28px;
    }

    /* Search ─── */
    .masthead-search {
      position: relative;
      max-width: 380px;
    }
    .masthead-search svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      flex-shrink: 0;
    }
    .masthead-search input {
      width: 100%;
      height: 46px;
      padding: 0 16px 0 44px;
      border-radius: 6px;
      border: 1px solid var(--border2);
      background: #fff;
      color: var(--ink);
      font-family: "Syne", sans-serif;
      font-weight: 600;
      font-size: 14px;
      outline: none;
      transition: border-color .16s, box-shadow .16s;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .masthead-search input::placeholder { color: rgba(0,0,0,.28); }
    .masthead-search input:focus {
      border-color: rgba(34,197,94,.55);
      box-shadow: 0 0 0 3px rgba(34,197,94,.10);
    }
    @media (max-width: 520px) { .masthead-search { max-width: 100%; } }

    /* Big decorative letter ─── */
    .masthead-deco {
      position: absolute;
      right: -10px;
      top: 10px;
      font-family: "Playfair Display", Georgia, serif;
      font-weight: 900;
      font-size: clamp(120px, 18vw, 220px);
      letter-spacing: -.04em;
      line-height: 1;
      color: transparent;
      -webkit-text-stroke: 1px rgba(34,197,94,.15);
      user-select: none;
      pointer-events: none;
    }
    @media (max-width: 700px) { .masthead-deco { display: none; } }

    /* Thin horizontal rule ─── */
    .masthead-rule {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 36px;
    }
    .masthead-rule::before,
    .masthead-rule::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .masthead-rule-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green);
      opacity: .6;
    }

    /* ═══════════════════════════════════════════════════════════
       FILTER BAR
    ═══════════════════════════════════════════════════════════ */
    .filterbar {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      padding: 16px 0 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }

    .fpill {
      height: 30px;
      padding: 0 14px;
      border-radius: 4px;
      border: 1px solid var(--border2);
      background: #fff;
      color: var(--muted);
      font-family: "Syne", sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .15s;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    .fpill:hover {
      border-color: rgba(34,197,94,.45);
      color: var(--ink);
      background: #f0faf3;
    }
    .fpill.on {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
      box-shadow: 0 2px 8px rgba(34,197,94,.25);
    }

    /* ═══════════════════════════════════════════════════════════
       FEATURED — BIG CARD
    ═══════════════════════════════════════════════════════════ */
    .feat-wrap {
      margin-bottom: 40px;
    }

    .feat-card {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 0;
      border: 1px solid rgba(34,197,94,.22);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s;
      background: var(--bg3);
      box-shadow: 0 4px 20px rgba(0,0,0,.07);
    }
    .feat-card:hover {
      border-color: rgba(34,197,94,.50);
      box-shadow: 0 16px 48px rgba(0,0,0,.12), 0 0 0 1px rgba(34,197,94,.10) inset;
    }
    @media (max-width: 860px) {
      .feat-card { grid-template-columns: 1fr; }
    }

    .feat-body {
      padding: 40px 44px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 24px;
      border-right: 1px solid var(--border);
    }
    @media (max-width: 860px) {
      .feat-body { padding: 28px 24px; border-right: none; border-bottom: 1px solid var(--border); }
    }

    .feat-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .feat-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 22px;
      padding: 0 9px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .10em;
      text-transform: uppercase;
    }
    .feat-badge-star {
      background: var(--green);
      color: #fff;
    }
    .feat-badge-theme {
      background: transparent;
      border: 1px solid;
    }

    .feat-title {
      font-family: "Playfair Display", Georgia, serif;
      font-weight: 700;
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1.15;
      letter-spacing: -.01em;
      color: var(--ink);
    }

    .feat-excerpt {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.80;
      color: var(--muted);
    }

    .feat-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .feat-meta {
      font-size: 12px;
      font-weight: 600;
      color: rgba(0,0,0,.35);
      letter-spacing: .04em;
    }

    .feat-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 38px;
      padding: 0 20px;
      border-radius: 5px;
      background: var(--green);
      color: #fff;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: .06em;
      text-transform: uppercase;
      transition: opacity .15s, transform .15s;
      flex-shrink: 0;
      box-shadow: 0 2px 10px rgba(34,197,94,.30);
    }
    .feat-cta:hover { opacity: .88; transform: translateY(-1px); }
    /* Stretch link */
    .feat-cta::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 12px;
    }

    /* Right panel — stat block */
    .feat-panel {
      padding: 36px 28px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 28px;
      background: linear-gradient(145deg, rgba(34,197,94,.06) 0%, #f7f9f7 60%);
    }
    @media (max-width: 860px) {
      .feat-panel { padding: 22px 24px; flex-direction: row; flex-wrap: wrap; gap: 20px; }
    }

    .feat-stat {
      border-left: 2px solid rgba(34,197,94,.35);
      padding-left: 16px;
    }
    .feat-stat-val {
      font-family: "Playfair Display", Georgia, serif;
      font-size: 28px;
      font-weight: 900;
      color: var(--green);
      line-height: 1;
      margin-bottom: 4px;
    }
    .feat-stat-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ═══════════════════════════════════════════════════════════
       SECTION HEADER
    ═══════════════════════════════════════════════════════════ */
    .sec-head {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 20px;
    }
    .sec-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .20em;
      text-transform: uppercase;
      color: rgba(0,0,0,.38);
    }
    .sec-count {
      font-family: "Playfair Display", Georgia, serif;
      font-size: 13px;
      font-style: italic;
      color: var(--green);
    }
    .sec-rule {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ═══════════════════════════════════════════════════════════
       ARTICLE GRID
    ═══════════════════════════════════════════════════════════ */
    .cw-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    @media (max-width: 960px) { .cw-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 580px)  { .cw-grid { grid-template-columns: 1fr; } }

    /* ─── Card ─── */
    .cw-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg3);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: transform .18s, box-shadow .18s, border-color .18s;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
    }
    .cw-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,.10);
      border-color: rgba(34,197,94,.30);
    }

    /* Colored top accent line per theme */
    .cw-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--card-accent, rgba(0,0,0,.07));
      border-radius: 10px 10px 0 0;
    }

    .card-head {
      padding: 20px 18px 14px;
    }
    .card-theme {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--card-accent, var(--muted));
      margin-bottom: 12px;
    }
    .card-theme-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    .cw-card h3 {
      font-family: "Playfair Display", Georgia, serif;
      font-weight: 700;
      font-size: 17px;
      line-height: 1.28;
      letter-spacing: -.01em;
      color: var(--ink);
    }

    .card-body {
      padding: 0 18px 14px;
      flex: 1;
    }
    .card-excerpt {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.75;
      color: var(--muted);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      padding: 12px 18px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .card-meta {
      font-size: 11px;
      font-weight: 600;
      color: rgba(0,0,0,.30);
      letter-spacing: .04em;
    }
    .card-read {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--card-accent, var(--green));
      flex-shrink: 0;
      transition: letter-spacing .15s;
    }
    .cw-card:hover .card-read { letter-spacing: .14em; }
    /* Stretch */
    .card-read::after {
      content: "";
      position: absolute;
      inset: 0;
    }

    /* Theme color assignments */
    .t-visa   { --card-accent: var(--theme-visa);   }
    .t-nomad  { --card-accent: var(--theme-nomad);  }
    .t-future { --card-accent: var(--theme-future); }
    .t-family { --card-accent: var(--theme-family); }

    /* ── Empty state ────────────────────────────────────────── */
    .cw-empty {
      display: none;
      grid-column: 1 / -1;
      padding: 60px 20px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: rgba(0,0,0,.28);
      border: 1px dashed var(--border2);
      border-radius: 10px;
    }

    /* ── Page-in animation ──────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .masthead        { animation: fadeUp .5s ease both; }
    .filterbar       { animation: fadeUp .5s .10s ease both; }
    .feat-wrap       { animation: fadeUp .5s .18s ease both; }
    .sec-head        { animation: fadeUp .5s .24s ease both; }
    .cw-grid         { animation: fadeUp .5s .30s ease both; }

  </style>
</head>

    /* ─── Theme → CSS class + color ────────────────────────── */
    var THEME_CLASS = {
      "Visa & Installation": "t-visa",
      "Nomad Life":          "t-nomad",
      "Future & Strategy":   "t-future",
      "Family":              "t-family"
    };
    var THEME_COLOR = {
      "Visa & Installation": "#10b981",
      "Nomad Life":          "#06b6d4",
      "Future & Strategy":   "#8b5cf6",
      "Family":              "#f97316"
    };

    var activeFilter = "all";

    function getLang() {
      return (localStorage.getItem("wigg_lang") || "en").toLowerCase();
    }
    function str(obj) {
      if (!obj) return "";
      if (typeof obj === "string") return obj;
      var l = getLang();
      return obj[l] || obj.en || "";
    }
    function tx() {
      var l = getLang();
      return I18N[l] || I18N.en;
    }
    function fmtDate(iso) {
      if (!iso) return "";
      var parts = iso.split("-").map(Number);
      var dt = new Date(Date.UTC(parts[0], parts[1] - 1, parts[2]));
      var l = getLang();
      var locale = l === "fr" ? "fr-FR" : l === "es" ? "es-ES" : "en-GB";
      return dt.toLocaleDateString(locale, { year: "numeric", month: "short", day: "numeric" });
    }

    /* ─── Featured card HTML ────────────────────────────────── */
    function featuredHTML(c) {
      var t     = tx();
      var url   = str(c.url);
      var color = THEME_COLOR[c.theme] || "var(--green)";
      var date  = c.date ? fmtDate(c.date) : "";

      var statsHTML = "";
      if (c.stats && c.stats.length) {
        statsHTML = c.stats.map(function(s) {
          return '<div class="feat-stat">' +
            '<div class="feat-stat-val">' + s.val + '</div>' +
            '<div class="feat-stat-label">' + s.label + '</div>' +
          '</div>';
        }).join("");
      } else {
        // Fallback stats from data
        var readNum = c.read ? c.read.replace(/[^0-9]/g, "") : "";
        statsHTML = [
          '<div class="feat-stat"><div class="feat-stat-val">150+</div><div class="feat-stat-label">countries</div></div>',
          readNum ? '<div class="feat-stat"><div class="feat-stat-val">~' + readNum + '</div><div class="feat-stat-label">min read</div></div>' : ''
        ].join("");
      }

      return '<div class="feat-card">' +
        '<div class="feat-body">' +
          '<div class="feat-tags">' +
            '<span class="feat-badge feat-badge-star">' + t.featured + '</span>' +
            '<span class="feat-badge feat-badge-theme" style="color:' + color + ';border-color:' + color + '40">' + (c.theme || "") + '</span>' +
            (c.region ? '<span class="feat-badge feat-badge-theme" style="color:rgba(255,255,255,.35);border-color:rgba(255,255,255,.12)">' + c.region + '</span>' : '') +
          '</div>' +
          '<div class="feat-title">' + str(c.title) + '</div>' +
          '<p class="feat-excerpt">' + str(c.excerpt) + '</p>' +
          '<div class="feat-footer">' +
            '<span class="feat-meta">' + (date || "") + (c.read ? "  ·  " + c.read : "") + '</span>' +
            '<a class="feat-cta" href="' + url + '">' + t.read + '</a>' +
          '</div>' +
        '</div>' +
        '<div class="feat-panel">' + statsHTML + '</div>' +
      '</div>';
    }

    /* ─── Article card HTML ─────────────────────────────────── */
    function cardHTML(c) {
      var t     = tx();
      var url   = str(c.url);
      var cls   = THEME_CLASS[c.theme] || "";
      var color = THEME_COLOR[c.theme] || "rgba(255,255,255,.35)";
      var date  = c.date ? fmtDate(c.date) : "";

      return '<article class="cw-card ' + cls + '" role="listitem">' +
        '<div class="card-head">' +
          '<div class="card-theme">' +
            '<span class="card-theme-dot"></span>' +
            (c.theme || "") +
          '</div>' +
          '<h3>' + str(c.title) + '</h3>' +
        '</div>' +
        '<div class="card-body">' +
          '<p class="card-excerpt">' + str(c.excerpt) + '</p>' +
        '</div>' +
        '<div class="card-footer">' +
          '<span class="card-meta">' + (date || "") + (c.read ? " · " + c.read : "") + '</span>' +
          '<a class="card-read" href="' + url + '">' + t.read + '</a>' +
        '</div>' +
      '</article>';
    }

    /* ─── Filter match ──────────────────────────────────────── */
    function matches(c) {
      var q   = document.getElementById("searchInput").value.trim().toLowerCase();
      var hay = [str(c.title), str(c.excerpt), c.theme || "", c.region || ""].join(" ").toLowerCase();
      var qOk = !q || hay.indexOf(q) !== -1;
      var fOk = activeFilter === "all" || c.theme === activeFilter;
      return qOk && fOk;
    }

    /* ─── Build filters ─────────────────────────────────────── */
    function buildFilters() {
      var t      = tx();
      var themes = [];
      CHRONICLES.forEach(function(c) {
        if (c.theme && themes.indexOf(c.theme) === -1) themes.push(c.theme);
      });

      var nav = document.getElementById("filters");
      nav.innerHTML = "";

      function makeBtn(label, val) {
        var btn = document.createElement("button");
        btn.className = "fpill" + (activeFilter === val ? " on" : "");
        btn.textContent = label;
        btn.addEventListener("click", function() {
          activeFilter = val;
          buildFilters();
          render();
        });
        nav.appendChild(btn);
      }

      makeBtn(t.all, "all");
      themes.forEach(function(th) { makeBtn(th, th); });
    }

    /* ─── Render ────────────────────────────────────────────── */
    function render() {
      var t        = tx();
      var featured = null;
      var rest     = [];

      CHRONICLES.forEach(function(c) {
        if (c.featured) featured = c;
        else rest.push(c);
      });

      var featSec  = document.getElementById("featuredSection");
      var featCard = document.getElementById("featuredCard");
      if (featured) {
        var showFeat = matches(featured);
        featSec.style.display = showFeat ? "" : "none";
        if (showFeat) featCard.innerHTML = featuredHTML(featured);
      } else {
        featSec.style.display = "none";
      }

      var filtered = rest.filter(matches);
      var grid = document.getElementById("grid");
      var emptyEl = document.getElementById("empty");

      if (filtered.length === 0) {
        grid.innerHTML = "";
        emptyEl.style.display = "block";
        emptyEl.textContent = t.empty;
        grid.appendChild(emptyEl);
      } else {
        grid.innerHTML = filtered.map(cardHTML).join("");
        emptyEl.style.display = "none";
      }

      document.getElementById("countBadge").textContent = filtered.length;
      document.getElementById("sectionLabel").textContent = t.section;
    }

    /* ─── Apply i18n ────────────────────────────────────────── */
    function applyI18n() {
      var t = tx();
      var l = getLang();
      document.documentElement.lang = l;
      document.getElementById("eyebrow").textContent      = t.eyebrow;
      document.getElementById("heroTitle").innerHTML      = "Wigg <em>" + (l === "fr" ? "Chroniques" : l === "es" ? "Crónicas" : "Chronicles") + "</em>";
      document.getElementById("heroSub").textContent      = t.sub;
      document.getElementById("searchInput").placeholder  = t.search;
    }

    /* ─── Init ──────────────────────────────────────────────── */
    function init() {
      applyI18n();
      buildFilters();
      render();
    }

    init();

    document.getElementById("searchInput").addEventListener("input", render);

    window.addEventListener("wigg_lang_changed", function() {
      applyI18n();
      buildFilters();
      render();
    });
  </script>

  <script src="/data/footer.js"></script>
