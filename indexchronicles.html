    function tx() {
      var l = getLang();
      return I18N[l] || I18N.en;
    }

    function fmtDate(iso) {
      if (!iso) return "";
      var parts = iso.split("-").map(Number);
      var dt = new Date(Date.UTC(parts[0], parts[1] - 1, parts[2]));
      var l = getLang();
      var locale = l === "fr" ? "fr-FR" : l === "es" ? "es-ES" : "en-GB";
      return dt.toLocaleDateString(locale, { year: "numeric", month: "short", day: "numeric" });
    }

    function themeChip(theme) {
      return CHIP[theme] || "chip-region";
    }

    function makeLangBadges(c) {
      var l = getLang();
      return ["en", "fr", "es"].map(function(code) {
        var href = (c.url && c.url[code]) ? c.url[code] : "#";
        var cls  = "cw-lang" + (code === l ? " active" : "");
        return '<a href="' + href + '" class="' + cls + '">' + code.toUpperCase() + '</a>';
      }).join("");
    }

    /* ─── Featured card HTML ────────────────────────────────── */
    function featuredHTML(c) {
      var t    = tx();
      var url  = str(c.url);
      var tc   = themeChip(c.theme);
      var date = c.date ? fmtDate(c.date) : "";
      return [
        '<div class="cw-feat">',
          '<div>',
            '<div class="cw-feat-meta">',
              '<span class="chip chip-feat">' + t.featured + '</span>',
              '<span class="chip ' + tc + '">' + (c.theme || "") + '</span>',
              '<span class="chip chip-region">' + (c.region || "") + '</span>',
              (date ? '<span class="chip chip-meta">' + date + '</span>' : ''),
              (c.read ? '<span class="chip chip-meta">· ' + c.read + '</span>' : ''),
            '</div>',
            '<h2>' + str(c.title) + '</h2>',
            '<p class="cw-feat-excerpt">' + str(c.excerpt) + '</p>',
          '</div>',
          '<div class="cw-feat-actions">',
            '<div class="cw-langs">' + makeLangBadges(c) + '</div>',
            '<a class="cw-btn" href="' + url + '">' + t.read + '</a>',
          '</div>',
        '</div>'
      ].join("");
    }

    /* ─── Article card HTML ─────────────────────────────────── */
    function cardHTML(c) {
      var t    = tx();
      var url  = str(c.url);
      var tc   = themeChip(c.theme);
      var date = c.date ? fmtDate(c.date) : "";
      return [
        '<article class="cw-card" role="listitem">',
          '<div class="cw-card-top">',
            '<div class="cw-card-meta">',
              '<span class="chip ' + tc + '">' + (c.theme || "") + '</span>',
              '<span class="chip chip-region">' + (c.region || "") + '</span>',
              (date ? '<span class="chip chip-meta">' + date + '</span>' : ''),
              (c.read ? '<span class="chip chip-meta">· ' + c.read + '</span>' : ''),
            '</div>',
            '<h3>' + str(c.title) + '</h3>',
          '</div>',
          '<div class="cw-card-body">',
            '<p class="cw-card-excerpt">' + str(c.excerpt) + '</p>',
          '</div>',
          '<div class="cw-card-footer">',
            '<div class="cw-langs">' + makeLangBadges(c) + '</div>',
            '<a class="cw-card-link" href="' + url + '">' + t.read + '</a>',
          '</div>',
        '</article>'
      ].join("");
    }

    /* ─── Filter match ──────────────────────────────────────── */
    function matches(c) {
      var q   = document.getElementById("searchInput").value.trim().toLowerCase();
      var hay = [str(c.title), str(c.excerpt), c.theme || "", c.region || ""].join(" ").toLowerCase();
      var qOk = !q || hay.indexOf(q) !== -1;
      var fOk = activeFilter === "all" || c.theme === activeFilter;
      return qOk && fOk;
    }

    /* ─── Build filter pills ────────────────────────────────── */
    function buildFilters() {
      var t      = tx();
      var themes = [];
      CHRONICLES.forEach(function(c) {
        if (c.theme && themes.indexOf(c.theme) === -1) themes.push(c.theme);
      });

      var nav = document.getElementById("filters");
      nav.innerHTML = "";

      function makeBtn(label, val) {
        var btn = document.createElement("button");
        btn.className = "cw-pill" + (activeFilter === val ? " on" : "");
        btn.textContent = label;
        btn.dataset.f = val;
        btn.addEventListener("click", function() {
          activeFilter = val;
          buildFilters();
          render();
        });
        nav.appendChild(btn);
      }

      makeBtn(t.all, "all");
      themes.forEach(function(th) { makeBtn(th, th); });
    }

    /* ─── Render ────────────────────────────────────────────── */
    function render() {
      var t        = tx();
      var featured = null;
      var rest     = [];

      CHRONICLES.forEach(function(c) {
        if (c.featured) featured = c;
        else rest.push(c);
      });

      /* Featured */
      var featSec  = document.getElementById("featuredSection");
      var featCard = document.getElementById("featuredCard");
      if (featured) {
        var showFeat = matches(featured);
        featSec.style.display = showFeat ? "" : "none";
        if (showFeat) featCard.innerHTML = featuredHTML(featured);
      }

      /* Grid */
      var filtered = rest.filter(matches);
      document.getElementById("grid").innerHTML = filtered.map(cardHTML).join("");

      /* Count & empty */
      var total = (featured && matches(featured) ? 1 : 0) + filtered.length;
      var emptyEl = document.getElementById("empty");
      emptyEl.style.display = total === 0 ? "block" : "none";
      emptyEl.textContent = t.empty;

      document.getElementById("countBadge").textContent = filtered.length;
      document.getElementById("sectionLabel").textContent = t.section;
    }

    /* ─── Apply static i18n ─────────────────────────────────── */
    function applyI18n() {
      var t = tx();
      var l = getLang();
      document.documentElement.lang = l;
      document.getElementById("eyebrow").textContent    = t.eyebrow;
      document.getElementById("heroTitle").textContent  = t.title;
      document.getElementById("heroSub").textContent    = t.sub;
      document.getElementById("searchInput").placeholder = t.search;
    }

    /* ─── Init ──────────────────────────────────────────────── */
    function init() {
      applyI18n();
      buildFilters();
      render();
    }

    init();

    document.getElementById("searchInput").addEventListener("input", render);

    window.addEventListener("wigg_lang_changed", function() {
      applyI18n();
      buildFilters();
      render();
    });
  </script>

  <script src="/data/footer.js"></script>
</body>
</html>
