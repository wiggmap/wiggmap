<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>WiggMap – Heroes list</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:16px;}
    table{border-collapse:collapse;width:100%;}
    th,td{border:1px solid #ddd;padding:8px;font-size:13px;}
    th{background:#f3f3f3;text-align:left;}
    code{font-size:12px;}
  </style>
</head>
<body>
  <h2>Countries → hero images</h2>
  <p><button id="btnCopy">Copy CSV</button></p>
  <div id="out">Loading...</div>

  <script>
    function escapeCsv(v){
      const s = String(v ?? "");
      return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
    }

    async function run(){
      const res = await fetch("/data/countries.json?nocache=" + Date.now(), { cache:"no-store" });
      if(!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();

      const rows = [];
      for(const slug of Object.keys(data)){
        const c = data[slug] || {};
        const heroSrc = c.hero?.src || "";
        const file = heroSrc.split("/").pop() || "";
        rows.push({ slug, name: c.name || "", heroSrc, file });
      }

      // Sort for readability
      rows.sort((a,b) => a.slug.localeCompare(b.slug));

      // HTML table
      const html = `
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>slug (key)</th>
              <th>name</th>
              <th>hero.src</th>
              <th>image file</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map((r,i)=>`
              <tr>
                <td>${i+1}</td>
                <td><code>${r.slug}</code></td>
                <td>${r.name}</td>
                <td><code>${r.heroSrc}</code></td>
                <td><code>${r.file}</code></td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
      document.getElementById("out").innerHTML = html;

      // CSV copy
      const csv = ["slug,name,hero_src,image_file"]
        .concat(rows.map(r => [
          escapeCsv(r.slug),
          escapeCsv(r.name),
          escapeCsv(r.heroSrc),
          escapeCsv(r.file),
        ].join(",")))
        .join("\n");

      document.getElementById("btnCopy").onclick = async () => {
        await navigator.clipboard.writeText(csv);
        alert("CSV copied ✅");
      };
    }

    run().catch(e=>{
      console.error(e);
      document.getElementById("out").textContent = "Error: " + e.message;
    });
  </script>
</body>
</html>
