  <link rel="manifest" href="/manifest.webmanifest">

  <title>WiggMap — Where is the grass greener?</title>
  <meta name="description" content="WiggMap helps you compare countries and find where opportunities fit you best.">
  <link rel="icon" href="/assets/favicon.ico" type="image/x-icon"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      /*
        Fond écho de l'image : très légère résonance chromatique
        ciel (haut) → neutre (milieu) → herbe (bas).
        Tellement subtil qu'il se lit comme "blanc cassé",
        mais l'image s'y pose naturellement.
      */
      background: #ffffff;
      overflow: hidden;
      font-family: "Poppins", system-ui, sans-serif;
    }

    /* ── Scene ────────────────────────────────────────────── */
    .scene {
      position: relative;
      width: 100vw;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Hero card wrapper ────────────────────────────────── */
    #heroCard {
      position: relative;
      z-index: 1;
      max-width: 100%;
      max-height: 100dvh;
      border-radius: 16px;
      overflow: hidden;
      /*
        6 couches d'ombre :
        1. contact  — ancrage au sol, très proche
        2. proche   — profondeur immédiate
        3. moyen    — élévation perceptible
        4. large    — halo ambiant
        5. très large — nuage de lumière diffuse
        6. XL       — présence environnementale
      */
      box-shadow:
        0 1px 4px   rgba(0,0,0,.08),
        0 4px 12px  rgba(0,0,0,.09),
        0 14px 36px rgba(0,0,0,.10),
        0 36px 90px rgba(0,0,0,.08),
        0 80px 180px rgba(0,0,0,.06),
        0 130px 300px rgba(0,0,0,.04);
    }

    /* Reflet diagonal très discret — surface en verre dépoli */
    #heroCard::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(158deg,
        rgba(255,255,255,.11) 0%,
        rgba(255,255,255,.03) 22%,
        transparent 45%
      );
      z-index: 1;
      pointer-events: none;
    }

    /* Liseré intérieur — bord en verre, presque imperceptible */
    #heroCard::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.68);
      z-index: 2;
      pointer-events: none;
    }

    #bgImg {
      display: block;
      max-width: 100%;
      max-height: 100dvh;
      width: auto;
      height: auto;
      user-select: none;
      pointer-events: none;
      -webkit-user-drag: none;
      vertical-align: bottom;
    }

    /* Mobile : image plein écran, traitement carte désactivé */
    @media (max-width: 600px) {
      html, body { background: #ffffff; }
      #heroCard {
        border-radius: 0;
        box-shadow: none;
        max-height: 100dvh;
      }
      #heroCard::before,
      #heroCard::after { display: none; }
    }

    /* ── Overlay ──────────────────────────────────────────── */
    #overlay {
      position: absolute;
      pointer-events: none;
      z-index: 2;
    }

    /* ──────────────────────────────────────────────────────
       SIGN POSITIONS — edit these CSS variables to realign.
       All values are % of the rendered image dimensions.
    ─────────────────────────────────────────────────────── */
    :root {
      --s-left:  16;    /* % from left edge */
      --s-width: 63;    /* % of image width */

      --s1-top: 28.7;  --s1-h: 6.5;  --s1-rot: 2;   /* Chronicles */
      --s2-top: 36.5;  --s2-h: 6.5;  --s2-rot: 1.5;   /* Compare    */
      --s3-top: 44.0;  --s3-h: 6.5;  --s3-rot: 1.5;   /* WiggGame   */
      --s4-top: 51.5;  --s4-h: 6.5;  --s4-rot: 1;   /* 3D Globe   */
      --s5-top: 59.5;  --s5-h: 6.5;  --s5-rot: 0.5;   /* Random     */
      --s6-top: 67.2;  --s6-h: 6;    --s6-rot: 0;   /* Search     */
    }

    /* ── Sign button base ─────────────────────────────────── */
    .sign-btn {
      position: absolute;
      display: flex;
      align-items: center;
      padding-left: 8%;
      padding-right: 16%;
      background: transparent;
      border: none;
      cursor: pointer;
      text-decoration: none;
      pointer-events: all;
      clip-path: polygon(0 0, 86% 0, 100% 50%, 86% 100%, 0 100%);
      transform: rotate(var(--el-rot, 0deg));
      transition: filter .20s ease, transform .20s ease;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    .sign-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      clip-path: inherit;
      background: rgba(255,255,255,0);
      transition: background .20s ease;
      pointer-events: none;
    }

    .sign-btn:hover {
      filter: brightness(1.08) saturate(1.05);
      transform: translateX(6px) rotate(var(--el-rot, 0deg));
    }
    .sign-btn:hover::after { background: rgba(255,255,255,.09); }
    .sign-btn:active { transform: translateX(3px) scale(.98) rotate(var(--el-rot, 0deg)); }
    .sign-btn:focus-visible {
      outline: 2px solid rgba(255,255,255,.75);
      outline-offset: 3px;
      border-radius: 2px;
    }

    /* ── Sign inner layout: icon + text ──────────────────── */
    .sign-inner {
      display: flex;
      align-items: center;
      gap: .45em;
      position: relative;
      z-index: 1;
    }

    .sign-icon {
      flex-shrink: 0;
      display: block;
      /* size set by JS */
    }

    .sign-text {
      display: flex;
      flex-direction: column;
      gap: .18em;
      align-items: flex-start;
    }

    .sign-main {
      font-family: "Poppins", system-ui, sans-serif;
      font-weight: 800;
      white-space: nowrap;
      letter-spacing: .06em;
      text-transform: uppercase;
      line-height: 1;
      user-select: none;
    }

    .sign-sub {
      font-family: "Poppins", system-ui, sans-serif;
      font-weight: 600;
      white-space: nowrap;
      letter-spacing: .01em;
      line-height: 1;
      user-select: none;
      opacity: .76;
    }

    /* ── Color themes per sign ───────────────────────────── */
    .s1 { color: #fff; }
    .s1 .sign-main { text-shadow: 0 1px 5px rgba(0,0,0,.32); }
    .s1 .sign-sub  { text-shadow: 0 1px 3px rgba(0,0,0,.22); }

    .s2 { color: #18301a; }
    .s2 .sign-main { text-shadow: 0 1px 2px rgba(0,0,0,.10); }
    .s2 .sign-sub  { text-shadow: none; }

    .s3 { color: #fff; }
    .s3 .sign-main { text-shadow: 0 1px 5px rgba(0,0,0,.32); }
    .s3 .sign-sub  { text-shadow: 0 1px 3px rgba(0,0,0,.22); }

    .s4 { color: #fff; }
    .s4 .sign-main { text-shadow: 0 1px 5px rgba(0,0,0,.32); }
    .s4 .sign-sub  { text-shadow: 0 1px 3px rgba(0,0,0,.22); }

    .s5 { color: #fff; }
    .s5 .sign-main { text-shadow: 0 1px 5px rgba(0,0,0,.32); }
    .s5 .sign-sub  { text-shadow: 0 1px 3px rgba(0,0,0,.22); }

    .s6 { color: #231f00; }
    .s6 .sign-main { text-shadow: 0 1px 2px rgba(0,0,0,.12); }
    .s6 .sign-sub  { text-shadow: none; }

    /* ── Language switcher ───────────────────────────────── */
    #langSwitch {
      position: fixed;
      top: 14px;
      right: 16px;
      z-index: 300;
    }

    #langTrigger {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 13px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.42);
      background: rgba(255,255,255,.72);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      cursor: pointer;
      font-family: "Poppins", system-ui, sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #18301a;
      transition: background .15s, border-color .15s;
      user-select: none;
    }
    #langTrigger:hover {
      background: rgba(255,255,255,.88);
      border-color: rgba(255,255,255,.65);
    }

    #langTrigger .arrow {
      font-size: 9px;
      color: #5b7a5e;
      transition: transform .18s;
      display: inline-block;
      line-height: 1;
    }
    #langSwitch.open #langTrigger .arrow { transform: rotate(180deg); }

    #langMenu {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: #fff;
      border: 1px solid rgba(0,0,0,.09);
      border-radius: 14px;
      box-shadow: 0 10px 32px rgba(0,0,0,.14);
      overflow: hidden;
      min-width: 150px;
    }
    #langSwitch.open #langMenu { display: block; }

    .lang-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 16px;
      font-family: "Poppins", system-ui, sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: #18201c;
      cursor: pointer;
      transition: background .12s;
      white-space: nowrap;
    }
    .lang-item:hover { background: rgba(46,204,113,.08); }
    .lang-item.active { background: rgba(46,204,113,.12); color: #1b5e20; }
    .lang-item + .lang-item { border-top: 1px solid rgba(0,0,0,.05); }

    /* ── Search overlay ───────────────────────────────────── */
    #searchOverlay {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.52);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      align-items: flex-start;
      justify-content: center;
      padding-top: 20vh;
    }
    #searchOverlay.open { display: flex; }

    .search-box {
      width: min(500px, 92vw);
      animation: dropIn .28s cubic-bezier(.22,1,.36,1) both;
    }

    .search-close {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 12px;
    }
    .search-close button {
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.22);
      color: rgba(255,255,255,.90);
      font-family: "Poppins", sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .04em;
      padding: 7px 18px;
      border-radius: 999px;
      cursor: pointer;
      transition: background .14s;
    }
    .search-close button:hover { background: rgba(255,255,255,.22); }

    .search-title {
      font-family: "Poppins", sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: #fff;
      text-align: center;
      margin-bottom: 16px;
      letter-spacing: .02em;
      text-shadow: 0 2px 10px rgba(0,0,0,.30);
    }

    .search-row {
      display: flex;
      background: rgba(255,255,255,.94);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,.28);
      transition: box-shadow .18s;
    }
    .search-row:focus-within {
      box-shadow: 0 10px 40px rgba(0,0,0,.38), 0 0 0 3px rgba(255,255,255,.28);
    }

    .search-input {
      flex: 1;
      height: 52px;
      padding: 0 20px;
      background: transparent;
      border: none;
      outline: none;
      font-family: "Poppins", sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: #1a2a1a;
      min-width: 0;
    }
    .search-input::placeholder { color: #aaa; font-weight: 500; }

    .search-go {
      height: 52px;
      padding: 0 24px;
      background: linear-gradient(135deg, #1a7a28, #27a038);
      border: none;
      font-family: "Poppins", sans-serif;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .03em;
      color: #fff;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background .15s;
    }
    .search-go:hover { background: linear-gradient(135deg, #145c20, #1a7a28); }

    #homeSuggest {
      margin-top: 8px;
      background: rgba(255,255,255,.97);
      border-radius: 12px;
      overflow: hidden;
      max-height: 260px;
      overflow-y: auto;
      display: none;
      box-shadow: 0 12px 36px rgba(0,0,0,.20);
    }

    .home-suggest-item {
      padding: 12px 18px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-family: "Poppins", sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #1a2a1a;
      border-bottom: 1px solid rgba(0,0,0,.05);
      transition: background .10s;
    }
    .home-suggest-item:last-child { border-bottom: none; }
    .home-suggest-item:hover,
    .home-suggest-item[aria-selected="true"] { background: #f0faf0; color: #1b5e20; }
    .home-suggest-sub { font-size: 11px; color: #bbb; font-weight: 600; }

    @keyframes dropIn {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-K4MMRD4R" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <!-- ── Language switcher ─────────────────────────────────── -->
  <div id="langSwitch">

  <!-- ── Scene ─────────────────────────────────────────────── -->
  <div class="scene">

      <!-- s6 – Search -->

  <!-- ── Search overlay ────────────────────────────────────── -->

  <!-- ── i18n ──────────────────────────────────────────────── -->
  <script>
    var I18N = {
      en: {
        chron:"Chronicles",     chronSub:"Articles & Analyses",
        compare:"Compare",      compareSub:"Countries Side by Side",
        game:"WiggGame",        gameSub:"Quiz & Play",
        globe:"3D Globe",       globeSub:"Explore the World",
        random:"Random",        randomSub:"Discover Anywhere",
        search:"Search",        searchSub:"Find Your Country",
        searchTitle:"Search a Country",
        placeholder:"e.g. Switzerland, Japan…",
        btn:"Go →", noMatch:"No match found."
      },
      fr: {
        chron:"Chroniques",     chronSub:"Articles & Analyses",
        compare:"Comparer",     compareSub:"Pays Côte à Côte",
        game:"WiggGame",        gameSub:"Quiz & Jeu",
        globe:"Globe 3D",       globeSub:"Explorer le Monde",
        random:"Aléatoire",     randomSub:"Découvrir un pays",
        search:"Chercher",      searchSub:"Trouver un Pays",
        searchTitle:"Rechercher un pays",
        placeholder:"ex. Suisse, Japon…",
        btn:"Go →", noMatch:"Aucun résultat."
      },
      es: {
        chron:"Crónicas",       chronSub:"Artículos y Análisis",
        compare:"Comparar",     compareSub:"Países Lado a Lado",
        game:"WiggGame",        gameSub:"Quiz y Juego",
        globe:"Globo 3D",       globeSub:"Explorar el Mundo",
        random:"Aleatorio",     randomSub:"Descubrir en cualquier lugar",
        search:"Buscar",        searchSub:"Encuentra tu País",
        searchTitle:"Buscar un País",
        placeholder:"p. ej. Suiza, Japón…",
        btn:"Ir →", noMatch:"Sin resultados."
      }
    };

    function getLang() { return (localStorage.getItem('wigg_lang') || 'en').toLowerCase(); }

    // Apply labels
    (function () {
      var t = I18N[getLang()] || I18N.en;
      var $ = function(id) { return document.getElementById(id); };
      $('lblChron').textContent      = t.chron;
      $('lblChronSub').textContent   = t.chronSub;
      $('lblCompare').textContent    = t.compare;
      $('lblCompareSub').textContent = t.compareSub;
      $('lblGame').textContent       = t.game;
      $('lblGameSub').textContent    = t.gameSub;
      $('lblGlobe').textContent      = t.globe;
      $('lblGlobeSub').textContent   = t.globeSub;
      $('lblRandom').textContent     = t.random;
      $('lblRandomSub').textContent  = t.randomSub;
      $('lblSearch').textContent     = t.search;
      $('lblSearchSub').textContent  = t.searchSub;
      $('searchTitle').textContent   = t.searchTitle;
      $('homeQuery').placeholder     = t.placeholder;
      $('searchGoBtn').textContent   = t.btn;
      window.__HOME_NO_MATCH = t.noMatch;
      document.documentElement.lang = getLang();
    })();

    // Language switcher init
    (function () {
      var FLAGS  = { en:'🇬🇧', fr:'🇫🇷', es:'🇪🇸' };
      var LABELS = { en:'EN', fr:'FR', es:'ES' };
      var cur    = getLang();

      document.getElementById('langFlag').textContent  = FLAGS[cur]  || FLAGS.en;
      document.getElementById('langLabel').textContent = LABELS[cur] || LABELS.en;

      // Mark active item
      document.querySelectorAll('.lang-item').forEach(function(el) {
        if (el.dataset.lang === cur) el.classList.add('active');
      });

      // Toggle dropdown
      var sw = document.getElementById('langSwitch');
      document.getElementById('langTrigger').addEventListener('click', function(e) {
        e.stopPropagation();
        var open = sw.classList.toggle('open');
        this.setAttribute('aria-expanded', open ? 'true' : 'false');
      });

      // Close on outside click
      document.addEventListener('click', function() {
        sw.classList.remove('open');
        document.getElementById('langTrigger').setAttribute('aria-expanded','false');
      });

      // Select language
      document.querySelectorAll('.lang-item').forEach(function(el) {
        el.addEventListener('click', function(e) {
          e.stopPropagation();
          localStorage.setItem('wigg_lang', el.dataset.lang);
          location.reload();
        });
      });
    })();
  </script>

  <!-- ── Overlay positioning ───────────────────────────────── -->
  <script>
    function cssVar(name) {
      return parseFloat(getComputedStyle(document.documentElement).getPropertyValue(name)) || 0;
    }

    var SIGNS = [
      { id:'s1', t:cssVar('--s1-top'), l:cssVar('--s-left'), w:cssVar('--s-width'), h:cssVar('--s1-h'), r:cssVar('--s1-rot') },
      { id:'s2', t:cssVar('--s2-top'), l:cssVar('--s-left'), w:cssVar('--s-width'), h:cssVar('--s2-h'), r:cssVar('--s2-rot') },
      { id:'s3', t:cssVar('--s3-top'), l:cssVar('--s-left'), w:cssVar('--s-width'), h:cssVar('--s3-h'), r:cssVar('--s3-rot') },
      { id:'s4', t:cssVar('--s4-top'), l:cssVar('--s-left'), w:cssVar('--s-width'), h:cssVar('--s4-h'), r:cssVar('--s4-rot') },
      { id:'s5', t:cssVar('--s5-top'), l:cssVar('--s-left'), w:cssVar('--s-width'), h:cssVar('--s5-h'), r:cssVar('--s5-rot') },
      { id:'s6', t:cssVar('--s6-top'), l:cssVar('--s-left'), w:cssVar('--s-width'), h:cssVar('--s6-h'), r:cssVar('--s6-rot') },
    ];

    var img     = document.getElementById('bgImg');
    var overlay = document.getElementById('overlay');

    function positionAll() {
      var r = img.getBoundingClientRect();
      overlay.style.left   = r.left   + 'px';
      overlay.style.top    = r.top    + 'px';
      overlay.style.width  = r.width  + 'px';
      overlay.style.height = r.height + 'px';

      SIGNS.forEach(function(s) {
        var el   = document.getElementById(s.id);
        if (!el) return;
        var elH  = s.h / 100 * r.height;
        var elW  = s.w / 100 * r.width;

        el.style.top    = (s.t / 100 * r.height) + 'px';
        el.style.left   = (s.l / 100 * r.width)  + 'px';
        el.style.width  = elW + 'px';
        el.style.height = elH + 'px';

        // Font sizes — clamped
        var mainPx = Math.max(10, Math.min(22, elH * 0.36));
        var subPx  = Math.max(8,  Math.min(14, mainPx * 0.60));
        var iconPx = Math.max(12, Math.min(26, mainPx * 1.30));

        el.querySelector('.sign-main').style.fontSize = mainPx + 'px';
        el.querySelector('.sign-sub').style.fontSize  = subPx  + 'px';
        var icon = el.querySelector('.sign-icon');
        if (icon) { icon.style.width = iconPx + 'px'; icon.style.height = iconPx + 'px'; }

        // Rotation — appliquée via CSS custom property pour que hover fonctionne
        el.style.setProperty('--el-rot', s.r + 'deg');
      });
    }

    if (img.complete && img.naturalWidth) { positionAll(); }
    img.addEventListener('load', positionAll);
    window.addEventListener('resize', positionAll);
  </script>

  <!-- ── Countries + Search ────────────────────────────────── -->
  <script src="data/countries.js"></script>
  <script>
    var searchOverlay = document.getElementById('searchOverlay');
    var qInp          = document.getElementById('homeQuery');

    document.getElementById('s6').addEventListener('click', function() {
      searchOverlay.classList.add('open');
      setTimeout(function() { qInp.focus(); }, 80);
    });
    document.getElementById('closeSearch').addEventListener('click', function() {
      searchOverlay.classList.remove('open'); hideSug();
    });
    searchOverlay.addEventListener('click', function(e) {
      if (e.target === searchOverlay) { searchOverlay.classList.remove('open'); hideSug(); }
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') { searchOverlay.classList.remove('open'); hideSug(); }
    });

    function norm(s) {
      return (s||'').toString().trim().toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
        .replace(/[-_]/g,' ').replace(/\s+/g,' ');
    }
    function esc(s) {
      return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
        .replaceAll('"','&quot;').replaceAll("'","&#039;");
    }

    var CDATA = null, CLIST = [], tDeb = null;

    async function loadOnce() {
      if (CDATA) return;
      var lang = getLang();
      var cf = lang==='fr' ? '/data/countries.fr.json' : lang==='es' ? '/data/countries.es.json' : '/data/countries.json';
      var res = await fetch(cf + '?nc=' + Date.now(), { cache:'no-store' });
      CDATA = await res.json();
      CLIST = Object.keys(CDATA).map(function(slug) {
        var c = CDATA[slug] || {}, al = Array.isArray(c.aliases) ? c.aliases : [];
        return { slug, name: c.name||slug, nn: norm(c.name||slug), an: al.map(norm) };
      }).sort(function(a,b) { return a.name.localeCompare(b.name); });
    }

    function getSugs(q, lim) {
      lim = lim||10; if (!q) return [];
      var s=[], c=[];
      CLIST.forEach(function(x) {
        if (x.nn.startsWith(q)||x.an.some(function(a){return a.startsWith(q);})) s.push(x);
        else if (x.nn.includes(q)||x.an.some(function(a){return a.includes(q);})) c.push(x);
      });
      return s.concat(c).slice(0,lim);
    }

    function bestMatch(q) {
      return CLIST.find(function(x){return x.nn===q||x.an.includes(q);})||
             CLIST.find(function(x){return x.nn.startsWith(q)||x.an.some(function(a){return a.startsWith(q);});})||
             CLIST.find(function(x){return x.nn.includes(q)||x.an.some(function(a){return a.includes(q);});})||null;
    }

    function go(slug) { window.location.href = '/countries/country.html?country=' + encodeURIComponent(slug); }

    var sugEl=document.getElementById('homeSuggest'), ai=-1, slist=[];
    function hideSug() { sugEl.style.display='none'; sugEl.innerHTML=''; ai=-1; slist=[]; }
    function showSug(items) {
      slist=items; ai=-1;
      if (!items.length) { hideSug(); return; }
      sugEl.innerHTML = items.map(function(x,i) {
        return '<div class="home-suggest-item" data-i="'+i+'" role="option" aria-selected="false">' +
               '<span>'+esc(x.name)+'</span><span class="home-suggest-sub">'+esc(x.slug)+'</span></div>';
      }).join('');
      sugEl.style.display = 'block';
    }
    function setAct(idx) {
      Array.from(sugEl.querySelectorAll('.home-suggest-item')).forEach(function(el,i) {
        el.setAttribute('aria-selected', i===idx ? 'true' : 'false');
      });
      ai=idx;
    }

    sugEl.addEventListener('click', function(e) {
      var it = e.target.closest('.home-suggest-item');
      if (!it) return;
      var i = Number(it.getAttribute('data-i'));
      if (slist[i]) go(slist[i].slug);
    });

    qInp.addEventListener('input', function() {
      clearTimeout(tDeb);
      tDeb = setTimeout(async function() { await loadOnce(); showSug(getSugs(norm(qInp.value),10)); }, 80);
    });

    qInp.addEventListener('keydown', function(e) {
      if (sugEl.style.display!=='block') return;
      var max = slist.length-1;
      if (e.key==='ArrowDown')  { e.preventDefault(); setAct(ai<max?ai+1:0); }
      if (e.key==='ArrowUp')    { e.preventDefault(); setAct(ai>0?ai-1:max); }
      if (e.key==='Enter'&&ai>=0&&slist[ai]) { e.preventDefault(); go(slist[ai].slug); }
      if (e.key==='Escape') hideSug();
    });

    document.addEventListener('click', function(e) {
      if (!e.target.closest('#homeSearchForm')&&!e.target.closest('#homeSuggest')) hideSug();
    });

    document.getElementById('homeSearchForm').addEventListener('submit', async function(e) {
      e.preventDefault(); await loadOnce();
      var q = norm(qInp.value); if (!q) return;
      if (ai>=0&&slist[ai]) return go(slist[ai].slug);
      var m = bestMatch(q);
      if (m) go(m.slug);
      else { alert(window.__HOME_NO_MATCH||'No match.'); hideSug(); qInp.focus(); }
    });

    async function goRandom() {
      await loadOnce();
      var k = Object.keys(CDATA||{});
      if (!k.length) return;
      go(k[Math.floor(Math.random()*k.length)]);
    }
    document.getElementById('s5').addEventListener('click', function(e) {
      e.preventDefault(); goRandom();
    });

    loadOnce().catch(console.error);
  </script>

  <script src="data/footer.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() { navigator.serviceWorker.register('/sw.js').catch(console.error); });
      navigator.serviceWorker.getRegistrations().then(function(r) { r.forEach(function(x) { x.update(); }); });
    }
  </script>
</body>
